function duplicateRecipe(recipeId) {
  const src = recipes.find(r => r.id === recipeId);
  if (!src) return;
  const maxOrder = recipes.length > 0 ? Math.max(...recipes.map(r => r.order ?? 0)) : -1;
  const newRecipe = {
    ...src,
    id:           genId(),
    name:         src.name + 'のコピー',
    order:        maxOrder + 1,
    ingredients:  src.ingredients.map(i => ({ ...i })),
    tagIds:       [...(src.tagIds || [])],
    savedAmounts: [],
    memo:         ''
  };
  recipes.push(newRecipe);
  saveRecipes();
  renderRecipeList();
  showToast('レシピを複製しました');

  // Highlight new card
  requestAnimationFrame(() => {
    const card = document.querySelector(`.recipe-card[data-id="${newRecipe.id}"]`);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    requestAnimationFrame(() => {
      card.classList.add('highlight-new');
      card.addEventListener('animationend', () => card.classList.remove('highlight-new'), { once: true });
    });
  });
}

// ============================================================
// Duplicate folder
// ============================================================
function duplicateFolder(folderId) {
  const src = folders.find(f => f.id === folderId);
  if (!src) return;
  const maxFolderOrder = folders.length > 0 ? Math.max(...folders.map(f => f.order ?? 0)) : -1;
  const newFolderId = 'folder_' + genId();
  const newFolder = {
    ...src,
    id:        newFolderId,
    name:      src.name + 'のコピー',
    order:     maxFolderOrder + 1,
    createdAt: new Date().toISOString()
  };
  folders.push(newFolder);

  // SPEC-004: Copy all recipes in the folder to the new folder
  const srcRecipes = recipes.filter(r => r.folderId === folderId);
  if (srcRecipes.length > 0) {
    const maxRecipeOrder = recipes.length > 0 ? Math.max(...recipes.map(r => r.order ?? 0)) : -1;
    srcRecipes.forEach((r, i) => {
      recipes.push({
        ...r,
        id:           genId(),
        folderId:     newFolderId,
        order:        maxRecipeOrder + 1 + i,
        ingredients:  r.ingredients.map(ing => ({ ...ing })),
        tagIds:       [...(r.tagIds || [])],
        savedAmounts: [],
        memo:         ''
      });
    });
    saveRecipes();
  }

  saveFolders();
  renderRecipeList();
  const recipeNote = srcRecipes.length > 0 ? `（レシピ${srcRecipes.length}件を複製）` : '';
  showToast(`フォルダを複製しました${recipeNote}`);

  requestAnimationFrame(() => {
    const card = document.querySelector(`.folder-card[data-folder-id="${newFolderId}"]`);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    requestAnimationFrame(() => {
      card.classList.add('highlight-new');
      card.addEventListener('animationend', () => card.classList.remove('highlight-new'), { once: true });
    });
  });
}

// ============================================================
// Folder delete modal (3-choice)
// ============================================================
let _folderDeleteTargetId = null;

function showFolderDeleteModal(folderId) {
  const folder = folders.find(f => f.id === folderId);
  if (!folder) return;
  _folderDeleteTargetId = folderId;
  const count = recipes.filter(r => r.folderId === folderId).length;
  document.getElementById('modal-folder-delete-title').textContent = `「${folder.name}」を削除`;
  document.getElementById('modal-folder-delete-msg').textContent =
    count > 0 ? `このフォルダには${count}件のレシピがあります。` : '';
  document.getElementById('modal-folder-delete').classList.remove('hidden');
}

function hideFolderDeleteModal() {
  document.getElementById('modal-folder-delete').classList.add('hidden');
  _folderDeleteTargetId = null;
}

function doFolderDelete(deleteRecipes) {
  const folderId = _folderDeleteTargetId;
  hideFolderDeleteModal();
  if (!folderId) return;

  if (folderId === '__bulk__') {
    // Bulk folder delete
    const toDeleteIds = new Set(checkedFolderIds);
    if (deleteRecipes) {
      const recipeIdsToDelete = new Set();
      toDeleteIds.forEach(fid => recipes.filter(r => r.folderId === fid).forEach(r => recipeIdsToDelete.add(r.id)));
      recipes = recipes.filter(r => !recipeIdsToDelete.has(r.id));
    } else {
      recipes.forEach(r => { if (toDeleteIds.has(r.folderId)) r.folderId = null; });
    }
    folders = folders.filter(f => !toDeleteIds.has(f.id));
    tags.forEach(t => {
      if (Array.isArray(t.scope)) {
        t.scope = t.scope.filter(id => !toDeleteIds.has(id));
        if (t.scope.length === 0) t.scope = 'all';
      }
    });
    saveRecipes(); saveFolders(); saveTags();
    exitBulkEditMode();
    showToast('フォルダを削除しました');
    return;
  }

  if (deleteRecipes) {
    recipes = recipes.filter(r => r.folderId !== folderId);
  } else {
    recipes.forEach(r => { if (r.folderId === folderId) r.folderId = null; });
  }
  folders = folders.filter(f => f.id !== folderId);
  tags.forEach(t => {
    if (Array.isArray(t.scope)) {
      t.scope = t.scope.filter(id => id !== folderId);
      if (t.scope.length === 0) t.scope = 'all';
    }
  });
  saveRecipes(); saveFolders(); saveTags();
  renderRecipeList();
  showToast('フォルダを削除しました');
}

document.getElementById('btn-folder-delete-with-recipes').addEventListener('click', () => doFolderDelete(true));
document.getElementById('btn-folder-delete-move-recipes').addEventListener('click', () => doFolderDelete(false));
document.getElementById('btn-folder-delete-cancel').addEventListener('click', hideFolderDeleteModal);
document.getElementById('modal-folder-delete').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-folder-delete')) hideFolderDeleteModal();
});

      <div class="folder-icon">📁</div>
      <div class="folder-info">
        <div class="folder-name">${escHtml(folder.name)}</div>
        <div class="folder-count">${count}件のレシピ</div>
      </div>
      <div class="folder-actions">
        <button class="btn-recipe-menu" data-folder-id="${folder.id}" aria-label="メニュー">⋮</button>
      </div>`;

    card.querySelector('.folder-icon').addEventListener('click', () => { if (!bulkEditMode) openFolderView(folder.id); });
    card.querySelector('.folder-info').addEventListener('click', () => { if (!bulkEditMode) openFolderView(folder.id); });

    const menuBtn = card.querySelector('.btn-recipe-menu');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!bulkEditMode) openFolderSheet(folder.id);
    });

    // Bulk edit checkbox
    if (bulkEditMode) {
      const cbWrap = document.createElement('div');
      cbWrap.className = 'bulk-checkbox-wrap';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = checkedFolderIds.has(folder.id);
      cbWrap.appendChild(cb);
      card.insertBefore(cbWrap, card.firstChild);
      card.classList.toggle('bulk-checked', checkedFolderIds.has(folder.id));
      const toggleFolderCheck = () => {
        cb.checked = !cb.checked;
        if (cb.checked) checkedFolderIds.add(folder.id);
        else            checkedFolderIds.delete(folder.id);
        card.classList.toggle('bulk-checked', cb.checked);
        updateBulkActionBar();
      };
      cbWrap.addEventListener('click', (e) => { e.stopPropagation(); toggleFolderCheck(); });
      card.addEventListener('click', (e) => { if (!cbWrap.contains(e.target)) toggleFolderCheck(); });
    } else {
      attachLongPress(card, () => {
        bulkEditMode = true;
        checkedRecipeIds.clear(); checkedFolderIds.clear();
        checkedFolderIds.add(folder.id);
        renderRecipeList();
      }, '.btn-recipe-menu');
    }

    if (tagSortMode && !bulkEditMode) {
      card.style.cursor = 'grab';
      card.style.userSelect = 'none';
      card.style.touchAction = 'none';
      card.addEventListener('mousedown', (e) => {
        if (e.target.closest('.btn-recipe-menu, .bulk-checkbox-wrap')) return;
        e.preventDefault();
        startListSortDrag(card, 'folder', folder.id, e.clientX, e.clientY);
      });
      card.addEventListener('touchstart', (e) => {
        if (e.target.closest('.btn-recipe-menu, .bulk-checkbox-wrap')) return;
        const t = e.touches[0];
        startListSortDrag(card, 'folder', folder.id, t.clientX, t.clientY);
      }, { passive: true });
    }

    grid.appendChild(card);
  });

  container.appendChild(grid);
}

// ============================================================
// Render recipe cards
// ============================================================
function renderRecipeCards(container, sortedRecipes) {
  const list = document.createElement('div');
  list.className = 'recipe-list';

  sortedRecipes.forEach(recipe => {
    const summary = recipe.ingredients.map(i => `${i.name}:${i.ratio}`).join(' / ');
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.dataset.id = recipe.id;

    // Build tag chips HTML for this recipe
    const recipeTags = (recipe.tagIds || [])
      .map(id => getTagById(id))
      .filter(Boolean);
    const tagsHtml = recipeTags.length > 0
      ? `<div class="recipe-tags-display">${
          recipeTags.map(t =>
            `<span class="tag-chip-sm" style="background:${escAttr(t.color)};color:${escAttr(getTextColor(t.color))};border:1.5px solid ${escAttr(getTagBorderColor(t.color))};text-shadow:${escAttr(getTextShadow(t.color))}">${escHtml(t.name)}</span>`
          ).join('')
        }</div>`
      : '';

    card.innerHTML = `
      <div class="recipe-info" data-id="${recipe.id}">
        <div class="recipe-name">${escHtml(recipe.name)}</div>
        <div class="recipe-summary">${escHtml(summary)}</div>
        ${tagsHtml}
      </div>
      <div class="recipe-actions">
        <button class="btn-recipe-menu" data-id="${recipe.id}" aria-label="メニュー">⋮</button>
      </div>`;

    // Bulk edit checkbox
    if (bulkEditMode) {
      const cbWrap = document.createElement('div');
      cbWrap.className = 'bulk-checkbox-wrap';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = checkedRecipeIds.has(recipe.id);
      cbWrap.appendChild(cb);
      card.insertBefore(cbWrap, card.firstChild);
      card.classList.toggle('bulk-checked', checkedRecipeIds.has(recipe.id));
      const toggleRecipeCheck = () => {
        cb.checked = !cb.checked;
        if (cb.checked) checkedRecipeIds.add(recipe.id);
        else            checkedRecipeIds.delete(recipe.id);
        card.classList.toggle('bulk-checked', cb.checked);
        updateBulkActionBar();
      };
      cbWrap.addEventListener('click', (e) => { e.stopPropagation(); toggleRecipeCheck(); });
      card.addEventListener('click', (e) => { if (!cbWrap.contains(e.target)) toggleRecipeCheck(); });
    } else {
      // Long-press to enter bulk edit with this card pre-checked
      attachLongPress(card, () => {
        bulkEditMode = true;
        checkedRecipeIds.clear(); checkedFolderIds.clear();
        checkedRecipeIds.add(recipe.id);
        renderRecipeList();
      }, '.btn-recipe-menu');
    }

    list.appendChild(card);
  });

  container.appendChild(list);

  container.querySelectorAll('.recipe-info').forEach(el => {
    el.addEventListener('click', () => { if (!bulkEditMode) openCalcScreen(el.dataset.id); });
  });
  container.querySelectorAll('.btn-recipe-menu').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); if (!bulkEditMode) openRecipeSheet(btn.dataset.id); });
  });

  if (bulkEditMode) return;

  // Sort mode: float+swap drag behavior
  if (tagSortMode) {
    container.querySelectorAll('.recipe-card').forEach(card => {
      const id = card.dataset.id;
      card.style.cursor = 'grab';
      card.style.userSelect = 'none';
      card.style.touchAction = 'none';
      card.addEventListener('mousedown', (e) => {
        if (e.target.closest('.btn-recipe-menu, .bulk-checkbox-wrap')) return;
        e.preventDefault();
        startListSortDrag(card, 'recipe', id, e.clientX, e.clientY);
      });
      card.addEventListener('touchstart', (e) => {
        if (e.target.closest('.btn-recipe-menu, .bulk-checkbox-wrap')) return;
        const t = e.touches[0];
        startListSortDrag(card, 'recipe', id, t.clientX, t.clientY);
      }, { passive: true });
    });
  }
}

function clearDropIndicators() {
  document.querySelectorAll('.recipe-card, .folder-card').forEach(c => {
    c.classList.remove('drag-over-top', 'drag-over-bottom');
  });
}

function reorderRecipes(srcId, targetId, insertBefore) {
  const sorted = [...recipes].sort((a, b) => a.order - b.order);
  const srcIdx = sorted.findIndex(r => r.id === srcId);
  const [src]  = sorted.splice(srcIdx, 1);
  const tgtIdx = sorted.findIndex(r => r.id === targetId);
  if (tgtIdx === -1)      sorted.push(src);
  else if (insertBefore)  sorted.splice(tgtIdx, 0, src);
  else                    sorted.splice(tgtIdx + 1, 0, src);
  sorted.forEach((r, i) => { r.order = i; });
  recipes = sorted;
  saveRecipes();
  renderRecipeList();
  showToast('順序を変更しました');
}

function reorderFolders(srcId, targetId, insertBefore) {
  const sorted = [...folders].sort((a, b) => a.order - b.order);
  const srcIdx = sorted.findIndex(f => f.id === srcId);
  const [src]  = sorted.splice(srcIdx, 1);
  const tgtIdx = sorted.findIndex(f => f.id === targetId);
  if (tgtIdx === -1)      sorted.push(src);
  else if (insertBefore)  sorted.splice(tgtIdx, 0, src);
  else                    sorted.splice(tgtIdx + 1, 0, src);
  sorted.forEach((f, i) => { f.order = i; });
  folders = sorted;
  saveFolders();
  renderRecipeList();
  showToast('順序を変更しました');
}

// ============================================================
// List sort: float+swap drag for recipe/folder cards
// ============================================================
function startListSortDrag(card, type, id, startX, startY) {
  const rect = card.getBoundingClientRect();
  const offsetX = startX - rect.left;
  const offsetY = startY - rect.top;

  // Floating clone
  const floatEl = card.cloneNode(true);
  floatEl.className = floatEl.className + ' list-sort-float-card';
  floatEl.style.left   = rect.left + 'px';
  floatEl.style.top    = rect.top  + 'px';
  floatEl.style.width  = rect.width  + 'px';
  floatEl.style.height = rect.height + 'px';
  document.body.appendChild(floatEl);

  // Placeholder (invisible, same height)
  const ph = document.createElement('div');
  ph.dataset.sortPlaceholder = 'true';
  ph.style.cssText = `height:${rect.height}px;visibility:hidden;flex-shrink:0;`;
  card.parentNode.insertBefore(ph, card);
  card.classList.add('list-sort-dragging');

  function onMove(clientX, clientY) {
    const newLeft = clientX - offsetX;
    const newTop  = clientY - offsetY;
    floatEl.style.left = newLeft + 'px';
    floatEl.style.top  = newTop  + 'px';

    const cy = newTop + rect.height / 2;

    floatEl.style.display = 'none';
    const el = document.elementFromPoint(clientX, cy);
    floatEl.style.display = '';

    const selector = type === 'recipe'
      ? '.recipe-card:not(.list-sort-dragging)'
      : '.folder-card:not(.list-sort-dragging)';
    const target = el ? el.closest(selector) : null;

    if (target && !target.dataset.sortPlaceholder) {
      const targetRect = target.getBoundingClientRect();
      // 75% threshold: easier to swap, especially for last→first
      const insertBefore = cy < targetRect.top + targetRect.height * 0.75;
      if (insertBefore) {
        target.parentNode.insertBefore(ph, target);
      } else {
        target.parentNode.insertBefore(ph, target.nextSibling);
      }
    }
  }

  function finish() {
    document.removeEventListener('mousemove', onMM);
    document.removeEventListener('mouseup',   onMU);
    document.removeEventListener('touchmove', onTM);
    document.removeEventListener('touchend',  onTE);
    document.removeEventListener('touchcancel', onTE);

    floatEl.remove();
    card.classList.remove('list-sort-dragging');

    const phParent = ph.parentNode;
    if (!phParent) { ph.remove(); return; }

    const allCards = [...phParent.querySelectorAll(
      type === 'recipe' ? '.recipe-card' : '.folder-card'
    )];

    const newOrderIds = [];
    allCards.forEach(el => {
      if (el.dataset.sortPlaceholder) {
        newOrderIds.push(id);
      } else {
        const elId = type === 'recipe' ? el.dataset.id : el.dataset.folderId;
        if (elId) newOrderIds.push(elId);
      }
    });
    if (!newOrderIds.includes(id)) newOrderIds.push(id);

    ph.remove();

    if (type === 'recipe') {
      newOrderIds.forEach((rid, i) => {
        const r = recipes.find(r => r.id === rid);
        if (r) r.order = i;
      });
      saveRecipes();
    } else {
      newOrderIds.forEach((fid, i) => {
        const f = folders.find(f => f.id === fid);
        if (f) f.order = i;
      });
      saveFolders();
    }
    showToast('順序を変更しました');
  }

  function onMM(e) { onMove(e.clientX, e.clientY); }
  function onMU()  { finish(); }
  function onTM(e) { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); }
  function onTE()  { finish(); }

  document.addEventListener('mousemove', onMM);
  document.addEventListener('mouseup',   onMU);
  document.addEventListener('touchmove', onTM, { passive: false });
  document.addEventListener('touchend',  onTE);
  document.addEventListener('touchcancel', onTE);
}

let _folderModalKBCleanup = null;

function showFolderModal(mode, folderId = null) {
  folderModalMode     = mode;
  folderModalTargetId = folderId;
  document.getElementById('modal-folder-title').textContent =
    mode === 'create' ? 'フォルダを作成' : 'フォルダ名を変更';
  const inp = document.getElementById('input-folder-name');
  inp.value = (mode === 'rename' && folderId)
    ? (folders.find(f => f.id === folderId)?.name || '') : '';
  hideError('modal-folder-error');
  const overlayEl = document.getElementById('modal-folder');
  overlayEl.classList.remove('hidden');
  _folderModalKBCleanup = attachModalKeyboard(overlayEl, overlayEl.querySelector('.modal-card'));
  setTimeout(() => { inp.focus(); focusScrollIntoView(inp); }, 50);
}

function hideFolderModal() {
  if (_folderModalKBCleanup) { _folderModalKBCleanup(); _folderModalKBCleanup = null; }
  document.getElementById('modal-folder').classList.add('hidden');
}

document.getElementById('btn-modal-folder-cancel').addEventListener('click', hideFolderModal);
document.getElementById('modal-folder').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-folder')) hideFolderModal();
});

document.getElementById('btn-modal-folder-save').addEventListener('click', saveFolderModal);

function saveFolderModal() {
  const name = document.getElementById('input-folder-name').value.trim();
  if (!name) { showError('modal-folder-error', 'フォルダ名を入力してください。'); return; }

  if (folderModalMode === 'create') {
    const maxOrder = folders.length > 0 ? Math.max(...folders.map(f => f.order ?? 0)) : -1;
    folders.push({ id: 'folder_' + genId(), name, order: maxOrder + 1, createdAt: new Date().toISOString() });
    saveFolders();
    renderRecipeList();
    showToast('フォルダを作成しました');
  } else {
    const f = folders.find(x => x.id === folderModalTargetId);
    if (f) {
      f.name = name;
      saveFolders();
      if (currentFolderView === folderModalTargetId) {
        document.getElementById('header-title').textContent = name;
        document.getElementById('list-screen-title').textContent = name;
      }
      renderRecipeList();
      showToast('フォルダ名を変更しました');
    }
  }
  hideFolderModal();
}

attachIMEGuard(document.getElementById('input-folder-name'), () => {
  if (!isComposing) saveFolderModal();
});

document.getElementById('btn-new-folder').addEventListener('click', () => showFolderModal('create'));

function showMoveDialog(recipeId) {
  const recipe = recipes.find(r => r.id === recipeId);
  const listEl = document.getElementById('move-options-list');
  listEl.innerHTML = '';

  const noOpt = document.createElement('div');
  noOpt.className = 'move-option' + (!recipe.folderId ? ' selected' : '');
  noOpt.innerHTML = '<span class="move-option-icon">📋</span>フォルダなし';
  noOpt.addEventListener('click', () => { moveRecipe(recipeId, null); hideMoveDialog(); });
  listEl.appendChild(noOpt);

  [...folders].sort((a, b) => a.order - b.order).forEach(folder => {
    const opt = document.createElement('div');
    opt.className = 'move-option' + (recipe.folderId === folder.id ? ' selected' : '');
    opt.innerHTML = `<span class="move-option-icon">📁</span>${escHtml(folder.name)}`;
    opt.addEventListener('click', () => { moveRecipe(recipeId, folder.id); hideMoveDialog(); });
    listEl.appendChild(opt);
  });

  document.getElementById('modal-move').classList.remove('hidden');
}

function hideMoveDialog() {
  document.getElementById('modal-move').classList.add('hidden');
}

function moveRecipe(recipeId, folderId) {
  const recipe = recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  recipe.folderId = folderId;
  saveRecipes();
  renderRecipeList();
  const label = folderId ? (folders.find(f => f.id === folderId)?.name || 'フォルダ') : 'フォルダなし';
  showToast(`「${label}」に移動しました`);
}

document.getElementById('btn-modal-move-cancel').addEventListener('click', hideMoveDialog);

function renderFormTagSection() {
  const sec = document.getElementById('form-tag-section');
  if (!sec) return;
  sec.innerHTML = '';

  const folderId = document.getElementById('input-recipe-folder').value || null;
  const contextTags = getTagsForContext(folderId).sort((a, b) => a.order - b.order);

  if (contextTags.length === 0 && tags.length === 0) {
    // No tags at all — just show add button
    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'tag-chip-add';
    addBtn.textContent = '＋ 新しいタグ';
    addBtn.addEventListener('click', () => {
      showTagModal('create', null, renderFormTagSection);
    });
    sec.appendChild(addBtn);
    return;
  }

  const lbl = document.createElement('span');
  lbl.className = 'form-tag-section-label';
  lbl.textContent = 'タグ';
  sec.appendChild(lbl);

  if (contextTags.length > 0) {
    const chipsRow = document.createElement('div');
    chipsRow.className = 'form-tag-chips';

    contextTags.forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip-form' + (formSelectedTagIds.includes(tag.id) ? ' selected' : '');
      chip.style.background = tag.color;
      chip.style.color = getTextColor(tag.color);
      chip.style.borderColor = getTagBorderColor(tag.color);
      chip.style.textShadow = getTextShadow(tag.color);
      chip.textContent = tag.name;
      chip.addEventListener('click', () => toggleFormTag(tag.id));
      chipsRow.appendChild(chip);
    });

    sec.appendChild(chipsRow);
  } else if (tags.length > 0) {
    // Tags exist but none are visible in this folder context
    const note = document.createElement('div');
    note.style.cssText = 'font-size:12px;color:#a0aec0;margin-bottom:6px';
    note.textContent = 'このフォルダで表示されるタグはありません';
    sec.appendChild(note);
  }

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'tag-chip-add';
  addBtn.textContent = '＋ 新しいタグ';
  addBtn.addEventListener('click', () => {
    showTagModal('create', null, renderFormTagSection);
  });
  sec.appendChild(addBtn);
}

function toggleFormTag(tagId) {
  const idx = formSelectedTagIds.indexOf(tagId);
  if (idx === -1) formSelectedTagIds.push(tagId);
  else formSelectedTagIds.splice(idx, 1);
  renderFormTagSection();
}

document.getElementById('input-recipe-folder').addEventListener('change', renderFormTagSection);

// ============================================================
// Tag Modal
// ============================================================
let _tagModalKBCleanup = null;

function showTagModal(mode, tagId, callback) {
  tagModalMode     = mode;
  tagModalTargetId = tagId;
  tagModalCallback = callback || null;

  const tag = tagId ? tags.find(t => t.id === tagId) : null;

  document.getElementById('modal-tag-title').textContent =
    mode === 'create' ? 'タグを作成' : 'タグを編集';

  // Tag name
  const nameInput = document.getElementById('input-tag-name');
  nameInput.value = tag ? tag.name : '';

  // Color picker
  tagModalSelectedColor = tag ? tag.color : TAG_PRESET_COLORS[tags.length % TAG_PRESET_COLORS.length];
  document.getElementById('input-tag-color').value = tagModalSelectedColor;
  // Reset canvas picker state
  _cpPickerOpen = false;
  const pickerDiv = document.getElementById('custom-color-picker');
  if (pickerDiv) pickerDiv.style.display = 'none';
  const customBtn = document.getElementById('btn-custom-color');
  if (customBtn) { customBtn.style.background = ''; customBtn.style.borderColor = ''; }
  renderTagColorPresets();

  // Scope
  const hasFolders = folders.length > 0;
  const scopeGroup = document.getElementById('tag-scope-group');
  scopeGroup.style.display = hasFolders ? '' : 'none';

  if (hasFolders) {
    let isSpecific = false;
    let selectedFolderIds = [];
    if (tag && Array.isArray(tag.scope)) {
      isSpecific = true;
      selectedFolderIds = [...tag.scope];
    }

    document.getElementById('tag-scope-all').checked      = !isSpecific;
    document.getElementById('tag-scope-specific').checked = isSpecific;
    renderScopeFolderCheckboxes(selectedFolderIds, !isSpecific);

    document.getElementById('tag-scope-all').onchange = () => {
      updateScopeFolderDisabledState(true);
    };
    document.getElementById('tag-scope-specific').onchange = () => {
      updateScopeFolderDisabledState(false);
    };
  }

  // Delete button
  const deleteWrap = document.getElementById('modal-tag-delete-wrap');
  deleteWrap.innerHTML = '';
  if (mode === 'edit' && tag) {
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger btn-full btn-sm';
    delBtn.textContent = '🗑 このタグを削除';
    delBtn.addEventListener('click', () => {
      showConfirm(`タグ「${tag.name}」を削除しますか？\nすべてのレシピからも削除されます。`, '削除の確認', '削除').then(ok => {
        if (!ok) return;
        deleteTag(tagId);
        hideTagModal();
        if (tagModalCallback) tagModalCallback();
        renderRecipeList();
        showToast('タグを削除しました');
      });
    });
    deleteWrap.appendChild(delBtn);
  }

  hideError('modal-tag-error');
  const tagOverlayEl = document.getElementById('modal-tag');
  tagOverlayEl.classList.remove('hidden');
  _tagModalKBCleanup = attachModalKeyboard(tagOverlayEl, tagOverlayEl.querySelector('.modal-card'));
  setTimeout(() => { nameInput.focus(); focusScrollIntoView(nameInput); }, 50);
}


function renderTagColorPresets() {
  const container = document.getElementById('tag-color-presets');
  if (!container) return;
  const current = (document.getElementById('input-tag-color').value || '').toLowerCase();
  container.innerHTML = '';
  // Update selected preview bubble
  const selPrev = document.getElementById('cp-selected-preview');
  if (selPrev && current) {
    selPrev.style.background = current;
    selPrev.style.borderColor = getTagBorderColor(current);
  }
  TAG_PRESET_COLORS.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'tag-preset-swatch' + (current === color.toLowerCase() ? ' selected' : '');
    sw.style.background = color;
    sw.style.border = '1.5px solid ' + getTagBorderColor(color);
    sw.addEventListener('click', () => {
      tagModalSelectedColor = color;
      document.getElementById('input-tag-color').value = color;
      if (_cpPickerOpen) cpSetFromHex(color);
      else renderTagColorPresets();
    });
    container.appendChild(sw);
  });
}

function renderScopeFolderCheckboxes(selectedIds, disabled) {
  const container = document.getElementById('tag-scope-folders');
  container.innerHTML = '';
  container.classList.toggle('all-mode', !!disabled);
  [...folders].sort((a, b) => a.order - b.order).forEach(folder => {
    const lbl = document.createElement('label');
    lbl.className = 'tag-scope-folder-item' + (disabled ? ' disabled' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = folder.id;
    cb.checked = selectedIds.includes(folder.id);
    cb.disabled = !!disabled;
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(folder.name));
    container.appendChild(lbl);
  });
}

function updateScopeFolderDisabledState(disabled) {
  const container = document.getElementById('tag-scope-folders');
  if (container) container.classList.toggle('all-mode', disabled);
  document.querySelectorAll('#tag-scope-folders .tag-scope-folder-item').forEach(lbl => {
    const cb = lbl.querySelector('input[type="checkbox"]');
    if (cb) cb.disabled = disabled;
    lbl.classList.toggle('disabled', disabled);
  });
}

function hideTagModal() {
  if (_tagModalKBCleanup) { _tagModalKBCleanup(); _tagModalKBCleanup = null; }
  document.getElementById('modal-tag').classList.add('hidden');

function saveTagFromModal() {
  const name = document.getElementById('input-tag-name').value.trim();
  if (!name) { showError('modal-tag-error', 'タグ名を入力してください。'); return; }

  const color = tagModalSelectedColor || document.getElementById('input-tag-color').value;

  // Determine scope
  let scope = 'all';
  const hasFolders = folders.length > 0;
  if (hasFolders && document.getElementById('tag-scope-specific').checked) {
    const checked = Array.from(
      document.querySelectorAll('#tag-scope-folders input[type="checkbox"]:checked')
    ).map(cb => cb.value);
    if (checked.length === 0) {
      showError('modal-tag-error', '表示するフォルダを1つ以上選択してください。');
      return;
    }
    scope = checked;
  }

  if (tagModalMode === 'create') {
    const maxTagOrder = tags.length > 0 ? Math.max(...tags.map(t => t.order ?? 0)) : -1;
    tags.push({
      id: 'tag_' + genId(),
      name,
      color,
      scope,
      order: maxTagOrder + 1,
      createdAt: new Date().toISOString()
    });
    saveTags();
    showToast('タグを作成しました');
  } else {
    const tag = tags.find(t => t.id === tagModalTargetId);
    if (tag) {
      tag.name  = name;
      tag.color = color;
      tag.scope = scope;
      saveTags();
      showToast('タグを更新しました');
    }
  }

  hideTagModal();
  if (tagModalCallback) tagModalCallback();
  renderRecipeList();
}

function deleteTag(tagId) {
  tags = tags.filter(t => t.id !== tagId);
  recipes.forEach(r => {
    if (r.tagIds) r.tagIds = r.tagIds.filter(id => id !== tagId);
  });
  activeTagFilter.delete(tagId);
  saveTags();
  saveRecipes();
}

    a.href     = url;
    a.download = `ratioApp_backup_${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

  divider.style.cssText = 'height:1px;background:#e2e8f0;margin:16px 0';

  fileInput.accept = '.json';

  impBtn.className = 'btn btn-secondary btn-sm';

    if (!file) { showAlert('ファイルを選択してください。', '入力エラー'); return; }

    showConfirm('選択したデータを上書きインポートしますか？\n現在のデータは上書きされます。', 'インポートの確認', 'インポート', false).then(ok => {

      const reader = new FileReader();

        let data;
        try { data = JSON.parse(e.target.result); } catch { showAlert('インポートできないファイルです。', 'エラー'); return; }
        if (typeof data !== 'object' || data === null || !data.version) { showAlert('インポートできないファイルです。', 'エラー'); return; }

        if (data.folders  !== undefined) { localStorage.setItem(STORAGE_KEYS.folders,  JSON.stringify(data.folders));  }
        if (data.tags     !== undefined) { localStorage.setItem(STORAGE_KEYS.tags,      JSON.stringify(data.tags));     }

        showAlert('インポートが完了しました。ページを再読み込みします。', '完了').then(() => location.reload());
      };
      reader.onerror = () => { showAlert('インポートできないファイルです。', 'エラー'); };
      reader.readAsText(file);
    });
  });
  el.appendChild(impBtn);
}

function renderTagManagementUI(el) {
  el.innerHTML = '';

  const hdr = document.createElement('span');
  hdr.className = 'settings-item-label';
  hdr.textContent = 'タグ管理';
  el.appendChild(hdr);

  // ── Control row ──
  const ctrlRow = document.createElement('div');
  ctrlRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap';

  if (!tagBulkDeleteMode) {
    const hint = document.createElement('span');
    hint.style.cssText = 'font-size:11px;color:#a0aec0;';
    hint.textContent = '長押しで一括削除';
    ctrlRow.appendChild(hint);
  } else {
    // 全選択/全解除
    const allChecked = tags.length > 0 && tags.every(t => checkedTagIds.has(t.id));
    const selAllBtn = document.createElement('button');
    selAllBtn.className = 'btn btn-secondary btn-sm';
    selAllBtn.textContent = allChecked ? '全解除' : '全選択';
    selAllBtn.addEventListener('click', () => {
      if (allChecked) checkedTagIds.clear();
      else tags.forEach(t => checkedTagIds.add(t.id));
      renderTagManagementUI(el);
    });
    ctrlRow.appendChild(selAllBtn);

    // 削除を実行
    const execBtn = document.createElement('button');
    execBtn.className = 'btn btn-danger btn-sm';
    execBtn.textContent = '削除を実行';
    execBtn.disabled = checkedTagIds.size === 0;
    execBtn.addEventListener('click', () => {
      const count = checkedTagIds.size;
      if (count === 0) return;
      showConfirm(`選択した${count}件のタグを削除しますか？該当タグが全レシピから外れます。`, '削除の確認', '削除').then(ok => {
        if (!ok) return;
        [...checkedTagIds].forEach(tagId => deleteTag(tagId));
        tagBulkDeleteMode = false;
        checkedTagIds.clear();
        renderSettings();
        showToast(`${count}件のタグを削除しました`);
      });
    });
    ctrlRow.appendChild(execBtn);

    // 完了
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn btn-secondary btn-sm';
    cancelBtn.textContent = '完了';
    cancelBtn.addEventListener('click', () => {
      tagBulkDeleteMode = false;
      checkedTagIds.clear();
      renderTagManagementUI(el);
    });
    ctrlRow.appendChild(cancelBtn);
  }

  el.appendChild(ctrlRow);

  if (tags.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'tag-mgmt-empty';
    empty.textContent = 'タグがありません';
    el.appendChild(empty);
  } else {
    const groups = buildTagGroups();
    groups.forEach(group => {
      const grpHdr = document.createElement('div');
      grpHdr.className = 'tag-mgmt-group-header';
      grpHdr.textContent = group.label;
      el.appendChild(grpHdr);

      const list = document.createElement('div');
      list.className = 'tag-mgmt-list';

      group.tags.forEach(tag => {
        const item = document.createElement('div');
        item.className = 'tag-mgmt-item';
        item.dataset.tagId = tag.id;

        if (tagBulkDeleteMode) {
          // Checkbox
          const cbWrap = document.createElement('div');
          cbWrap.style.cssText = 'display:flex;align-items:center;justify-content:center;width:36px;min-height:44px;flex-shrink:0;cursor:pointer';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = checkedTagIds.has(tag.id);
          cb.style.cssText = 'width:18px;height:18px;accent-color:#4A90D9;pointer-events:none';
          cbWrap.appendChild(cb);
          const toggle = () => {
            if (checkedTagIds.has(tag.id)) checkedTagIds.delete(tag.id);
            else checkedTagIds.add(tag.id);
            renderTagManagementUI(el);
          };
          cbWrap.addEventListener('click', toggle);
          item.addEventListener('click', (e) => { if (!cbWrap.contains(e.target)) toggle(); });
          item.appendChild(cbWrap);
          if (checkedTagIds.has(tag.id)) item.style.background = '#ebf4ff';
        }

        const dot = document.createElement('div');
        dot.className = 'tag-mgmt-dot';
        dot.style.background = tag.color;

        const info = document.createElement('div');
        info.className = 'tag-mgmt-info';
        info.innerHTML = `<div class="tag-mgmt-name">${escHtml(tag.name)}</div>
          <div class="tag-mgmt-scope">${escHtml(getScopeLabel(tag.scope))}</div>`;

        item.appendChild(dot);
        item.appendChild(info);

        if (!tagBulkDeleteMode) {
          const editBtn = document.createElement('button');
          editBtn.className = 'btn btn-secondary btn-sm';
          editBtn.textContent = '編集';
          editBtn.addEventListener('click', () => showTagModal('edit', tag.id, () => renderSettings()));
          item.appendChild(editBtn);

          attachLongPress(item, () => {
            tagBulkDeleteMode = true;
            checkedTagIds.clear();
            checkedTagIds.add(tag.id);
            renderTagManagementUI(el);
          }, '.btn');
        }

        list.appendChild(item);
      });

      el.appendChild(list);
    });
  }

  if (!tagBulkDeleteMode) {
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-secondary btn-sm';
    addBtn.style.marginTop = '8px';
    addBtn.textContent = '＋ タグを追加';
    addBtn.addEventListener('click', () => showTagModal('create', null, () => renderSettings()));
    el.appendChild(addBtn);
  }
}

function isRecipeFormDirty() {
  const name = document.getElementById('input-recipe-name').value.trim();
  const recipe = currentRecipeId ? recipes.find(r => r.id === currentRecipeId) : null;

  if (recipe) {
    // Edit mode: only dirty if something actually changed
    if (name !== recipe.name) return true;
    const folderId = document.getElementById('input-recipe-folder').value || null;
    if (folderId !== (recipe.folderId || null)) return true;
    const currentTagIds = [...formSelectedTagIds].sort().join(',');
    const originalTagIds = [...(recipe.tagIds || [])].sort().join(',');
    if (currentTagIds !== originalTagIds) return true;
    const rows = document.getElementById('ingredients-container').querySelectorAll('.ingredient-row');
    if (rows.length !== recipe.ingredients.length) return true;
    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const n = row.querySelector('.ingredient-name').value.trim();
      const r = parseFloat(row.querySelector('.ingredient-ratio').value);
      if (n !== recipe.ingredients[i].name) return true;
      if (r !== recipe.ingredients[i].ratio) return true;
    }
    return false;
  } else {
    // New recipe: dirty if any content entered
    if (name) return true;
    const rows = document.getElementById('ingredients-container').querySelectorAll('.ingredient-row');
    for (const row of rows) {
      if (row.querySelector('.ingredient-name').value.trim()) return true;
      if (row.querySelector('.ingredient-ratio').value.trim()) return true;
    }
    return false;
  }
}

function addIngredientRow(name = '', ratio = '') {
  const container = document.getElementById('ingredients-container');

    <input class="input input-sm ingredient-name"  type="text"   placeholder="材料名（例：赤）" maxlength="30" value="${escAttr(name)}">

    <button class="btn-remove-ingredient" aria-label="削除">×</button>`;
  container.appendChild(row);
  const nameInp2 = row.querySelector('.ingredient-name');
  attachIMEGuard(nameInp2, null);
  nameInp2.addEventListener('focus', () => focusScrollIntoView(nameInp2));
  const ratioInp = row.querySelector('.ingredient-ratio');
  ratioInp.addEventListener('focus', () => focusScrollIntoView(ratioInp));
  ratioInp.addEventListener('input', () => {
    document.getElementById('btn-normalize-ratio').disabled = false;
  });
  ratioInp.addEventListener('keydown', (e) => {
    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    e.preventDefault();
    const cur = parseFloat(ratioInp.value);
    const isUp = e.key === 'ArrowUp';
    let next;
    if (isNaN(cur)) {
      next = 1;
    } else if (Number.isInteger(cur)) {
      next = isUp ? cur + 1 : cur - 1;
    } else {
      next = isUp ? Math.ceil(cur) : Math.floor(cur);
    }
    ratioInp.value = Math.max(1, next);
  });
  row.querySelector('.btn-remove-ingredient').addEventListener('click', () => {
    if (container.querySelectorAll('.ingredient-row').length > 2) {
      row.remove();
      clearPrevRatios();
    } else showToast('最低2組の材料が必要です');
    updateRemoveButtons();
  });
  updateRemoveButtons();
}

// State for ratio undo
let prevRatios = null;

function clearPrevRatios() {
  prevRatios = null;
  document.getElementById('btn-undo-ratio').disabled    = true;
  document.getElementById('btn-normalize-ratio').disabled = false;
}

function decimalPlaces(n) {
  const s = String(n);
  const dot = s.indexOf('.');
  return dot === -1 ? 0 : s.length - dot - 1;
}
function gcdTwo(a, b) { while (b) { const t = b; b = a % b; a = t; } return a; }

document.getElementById('btn-add-ingredient').addEventListener('click', () => {
  addIngredientRow();
  updateRemoveButtons();
  clearPrevRatios();
});

document.getElementById('btn-normalize-ratio').addEventListener('click', () => {
  const ratioInputs = [...document.getElementById('ingredients-container')
    .querySelectorAll('.ingredient-ratio')];
  const rawValues = ratioInputs.map(inp => parseFloat(inp.value));

  if (rawValues.some(v => isNaN(v) || v <= 0)) {
    showAlert('比率が入力されていない材料があります', '入力エラー');
    return;
  }

  // Save current values before converting (overwrites any previous save)
  prevRatios = ratioInputs.map(inp => inp.value);

  // Normalize: multiply by 10^maxDecimals to get integers, then divide by GCD
  const maxDec     = Math.max(...rawValues.map(decimalPlaces));
  const mult       = Math.pow(10, maxDec);
  const integers   = rawValues.map(v => Math.round(v * mult));
  const g          = integers.reduce((acc, n) => gcdTwo(acc, n));
  const normalized = integers.map(n => n / g);
  ratioInputs.forEach((inp, i) => { inp.value = normalized[i]; });

  // Enable undo, disable normalize
  document.getElementById('btn-undo-ratio').disabled      = false;
  document.getElementById('btn-normalize-ratio').disabled = true;
});

document.getElementById('btn-undo-ratio').addEventListener('click', () => {
  if (!prevRatios) return;
  const ratioInputs = [...document.getElementById('ingredients-container')
    .querySelectorAll('.ingredient-ratio')];
  ratioInputs.forEach((inp, i) => { if (prevRatios[i] !== undefined) inp.value = prevRatios[i]; });
  clearPrevRatios();
});

function saveRecipe() {
  const name = document.getElementById('input-recipe-name').value.trim();
  const folderId = document.getElementById('input-recipe-folder').value || null;
  const rows = document.getElementById('ingredients-container').querySelectorAll('.ingredient-row');
  const ingredients = [];
  let valid = true;

  if (!name) { showError('form-error', 'レシピ名を入力してください。'); return; }

  rows.forEach(row => {
    const n = row.querySelector('.ingredient-name').value.trim();
    const rRaw = row.querySelector('.ingredient-ratio').value.trim();
    if (!n && !rRaw) return; // skip completely blank rows
    const r = parseFloat(rRaw);
    if (!n || isNaN(r) || r <= 0) valid = false;
    ingredients.push({ name: n, ratio: r });
  });

  if (ingredients.length === 0) { showError('form-error', '材料を1つ以上入力してください。'); return; }
  if (!valid) { showError('form-error', '材料名と比率（0より大きい数値）をすべて入力してください。'); return; }

  const tagIds = [...formSelectedTagIds];

  if (currentRecipeId) {
    const idx = recipes.findIndex(r => r.id === currentRecipeId);
    if (idx !== -1) recipes[idx] = { ...recipes[idx], name, ingredients, folderId, tagIds };
  } else {
    const maxOrder = recipes.length > 0 ? Math.max(...recipes.map(r => r.order ?? 0)) : -1;
    recipes.push({ id: genId(), name, ingredients, order: maxOrder + 1, folderId, tagIds, savedAmounts: [], memo: '' });
  }
  saveRecipes();
  showToast(currentRecipeId ? 'レシピを更新しました' : 'レシピを保存しました');
  // BUG-003 fix: preserve folder context so user stays in the folder they were editing
  // Update currentFolderView to match where the saved recipe ended up
  currentFolderView = folderId;
  searchQuery = '';
  const si = document.getElementById('recipe-search');
  if (si) { si.value = ''; document.getElementById('recipe-search-clear').style.display = 'none'; }
  renderRecipeList();
  const screenToShow = folderId ? 'folder-view' : 'list';
  // Push to history only if we're transitioning to a new view (e.g. main list → folder)
  const alreadyThere = historyStack[historyStack.length - 1] === screenToShow;
  showScreen(screenToShow, !alreadyThere);
  closeRecipeFormModal();
}

// Screen 3: Calculate
// ============================================================
function openCalcScreen(recipeId) {
  calcRecipeId = recipeId;
  const recipe = recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  if (settings.lastRecipe) { settings.lastOpenedRecipeId = recipeId; saveSettings(); }
  document.getElementById('calc-recipe-name').textContent = recipe.name;
  document.getElementById('calc-ratio-badges').innerHTML = recipe.ingredients
    .map(i => `<span class="ratio-badge">${escHtml(i.name)} : ${escHtml(String(i.ratio))}</span>`)
    .join('');
  document.getElementById('input-total-amount').value = '';
  document.getElementById('input-unit').value = '';
  document.getElementById('calc-result').style.display = 'none';
  document.getElementById('btn-total-copy').disabled = true;
  document.getElementById('btn-total-memo').disabled = true;
  hideError('calc-error');
  // Init ingredient sets
  calcIngredientSets = [{ id: genId(), lastEditedIdx: null, activeInputIdx: null, values: recipe.ingredients.map(() => '') }];
  renderCalcIngredientSets(recipe);
  renderSavedAmounts(recipe);

  // Calc screen memo
  const calcMemoTA = document.getElementById('calc-memo-textarea');
  calcMemoTA.value = recipe.memo || '';
  calcMemoTA.style.height = 'auto';
  calcMemoTA.style.height = Math.max(80, calcMemoTA.scrollHeight) + 'px';
  document.getElementById('btn-memo-copy').disabled = !calcMemoTA.value;
  let isMemoComposing = false;
  let memoSaveTimer = null;
  const saveMemoDebounced = () => {
    clearTimeout(memoSaveTimer);
    memoSaveTimer = setTimeout(() => { recipe.memo = calcMemoTA.value; saveRecipes(); }, 400);
  };
  calcMemoTA.oninput = null;
  calcMemoTA.oncompositionstart = () => { isMemoComposing = true; };
  calcMemoTA.oncompositionend   = () => {
    isMemoComposing = false;
    saveMemoDebounced();
  };
  calcMemoTA.oninput = function() {
    this.style.height = 'auto';
    this.style.height = Math.max(80, this.scrollHeight) + 'px';
    document.getElementById('btn-memo-copy').disabled = !this.value;
    if (!isMemoComposing) saveMemoDebounced();
  };

  // Register save button handler (overwrite any previous)
  document.getElementById('saveAmountBtn').onclick = () => {
    const val = parseFloat(document.getElementById('input-total-amount').value);
    if (isNaN(val) || val <= 0) return;
    if (!recipe.savedAmounts) recipe.savedAmounts = [];
    if (recipe.savedAmounts.includes(val)) return;
    recipe.savedAmounts.push(val);
    saveRecipes();
    renderSavedAmounts(recipe);
  };

  showScreen('calc');
}

// ============================================================
// Ingredient-based calculation sets
// ============================================================
function addCalcIngredientSet(recipe) {
  calcIngredientSets.push({ id: genId(), lastEditedIdx: null, activeInputIdx: null, values: recipe.ingredients.map(() => '') });
  renderCalcIngredientSets(recipe);
}

function removeCalcIngredientSet(setId) {
  calcIngredientSets = calcIngredientSets.filter(s => s.id !== setId);
  const recipe = recipes.find(r => r.id === calcRecipeId);
  renderCalcIngredientSets(recipe);
}

function renderCalcIngredientSets(recipe) {
  const container = document.getElementById('calc-ingredient-sets');
  if (!container || !recipe) return;
  container.innerHTML = '';

  calcIngredientSets.forEach((set, setIdx) => {
    const setDiv = document.createElement('div');
    setDiv.className = 'calc-ing-set';
    setDiv.dataset.setId = set.id;

    if (setIdx > 0) {
      const header = document.createElement('div');
      header.className = 'calc-ing-set-header';
      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn-remove-calc-set';
      removeBtn.type = 'button';
      removeBtn.textContent = '✕';
      removeBtn.addEventListener('click', () => removeCalcIngredientSet(set.id));
      header.appendChild(removeBtn);
      setDiv.appendChild(header);
    }

    recipe.ingredients.forEach((ing, ingIdx) => {
      const row = document.createElement('div');
      row.className = 'calc-ing-row';

      const nameEl = document.createElement('div');
      nameEl.className = 'calc-ing-name';
      nameEl.textContent = ing.name;

      const inp = document.createElement('input');
      inp.className = 'input input-sm calc-ing-input';
      inp.type = 'number';
      inp.inputMode = 'decimal';
      inp.placeholder = '数値';
      inp.min = '0';
      inp.dataset.ingIdx = ingIdx;
      inp.value = set.values[ingIdx] || '';
      inp.addEventListener('focus', () => { set.activeInputIdx = ingIdx; focusScrollIntoView(inp); });
      inp.addEventListener('input', () => {
        set.values[ingIdx] = inp.value;
        set.lastEditedIdx = inp.value ? ingIdx : null;
        if (!inp.value) {
          for (let i = 0; i < set.values.length; i++) {
            if (set.values[i]) { set.lastEditedIdx = i; break; }
          }
        }
        updateCalcIngredientSet(set, recipe, setDiv);
      });

      row.appendChild(nameEl);
      row.appendChild(inp);
      setDiv.appendChild(row);
    });

    // +10/+50/+100/Reset buttons for this set
    const btnRow = document.createElement('div');
    btnRow.className = 'amount-btn-row';
    btnRow.style.marginTop = '8px';
    [10, 50, 100].forEach(delta => {
      const b = document.createElement('button');
      b.className = 'btn-amount';
      b.type = 'button';
      b.textContent = '+' + delta;
      b.addEventListener('click', () => {
        const idx = set.activeInputIdx !== null ? set.activeInputIdx
                  : set.lastEditedIdx   !== null ? set.lastEditedIdx : 0;
        const inputs = setDiv.querySelectorAll('.calc-ing-input');
        const inp2 = inputs[idx];
        if (!inp2) return;
        const cur = parseFloat(inp2.value) || 0;
        inp2.value = cur + delta;
        set.values[idx] = inp2.value;
        set.lastEditedIdx = idx;
        updateCalcIngredientSet(set, recipe, setDiv);
      });
      btnRow.appendChild(b);
    });
    const resetB = document.createElement('button');
    resetB.className = 'btn-amount btn-amount-reset';
    resetB.type = 'button';
    resetB.textContent = 'リセット';
    resetB.addEventListener('click', () => {
      const inputs = setDiv.querySelectorAll('.calc-ing-input');
      inputs.forEach((inp2, idx) => { inp2.value = ''; set.values[idx] = ''; });
      set.lastEditedIdx = null;
    });
    btnRow.appendChild(resetB);
    setDiv.appendChild(btnRow);

    // Copy / Memo buttons for this ingredient set
    const actionRow = document.createElement('div');
    actionRow.className = 'result-action-row';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn btn-secondary btn-sm';
    copyBtn.type = 'button';
    copyBtn.textContent = 'コピー';
    copyBtn.disabled = true;
    copyBtn.dataset.role = 'ing-copy';
    copyBtn.addEventListener('click', () => {
      const unit = document.getElementById('input-unit').value.trim() || '';
      const text = getIngSetResultText(set, recipe, unit);
      if (!text) return;
      navigator.clipboard.writeText(text)
        .then(() => tempBtnText(copyBtn, 'コピーしました'))
        .catch(() => tempBtnText(copyBtn, 'コピー失敗'));
    });
    const memoBtn = document.createElement('button');
    memoBtn.className = 'btn btn-secondary btn-sm';
    memoBtn.type = 'button';
    memoBtn.textContent = 'メモに出力';
    memoBtn.disabled = true;
    memoBtn.dataset.role = 'ing-memo';
    memoBtn.addEventListener('click', () => {
      const unit    = document.getElementById('input-unit').value.trim() || '';
      const ingIdx  = set.lastEditedIdx;
      const ingName = ingIdx !== null ? recipe.ingredients[ingIdx].name : '';
      const inputVal = ingIdx !== null ? (set.values[ingIdx] || '') : '';
      const header  = `${nowLabel()}\n${ingName}を基準: ${inputVal}${unit}入力`;
      const line    = getIngSetResultText(set, recipe, unit);
      if (!line) return;
      appendToMemo(`${header}\n${line}`);
      tempBtnText(memoBtn, '出力しました');
    });
    actionRow.appendChild(copyBtn);
    actionRow.appendChild(memoBtn);
    setDiv.appendChild(actionRow);

    container.appendChild(setDiv);
    updateCalcIngredientSet(set, recipe, setDiv);
  });
}

function getIngSetResultText(set, recipe, unit) {
  if (set.lastEditedIdx === null) return '';
  const parts = recipe.ingredients.map((ing, idx) => {
    const v = set.values[idx];
    return v ? `${ing.name}: ${v}${unit}` : null;
  }).filter(Boolean);
  return parts.join(' / ');
}

function updateCalcIngredientSet(set, recipe, setDiv) {
  if (set.lastEditedIdx === null) return;
  const ingIdx = set.lastEditedIdx;
  const inputVal = parseFloat(set.values[ingIdx]);
  if (isNaN(inputVal) || inputVal <= 0) return;

  const srcRatio = recipe.ingredients[ingIdx].ratio;
  const inputs = setDiv.querySelectorAll('.calc-ing-input');

  inputs.forEach((inp, idx) => {
    if (idx === ingIdx) return;
    const result = (inputVal / srcRatio) * recipe.ingredients[idx].ratio;
    const formatted = formatCalcResult(result);
    inp.value = formatted;          // direct assignment — no input event fired
    set.values[idx] = formatted;
  });

  // Enable copy/memo buttons for this set
  setDiv.querySelectorAll('[data-role="ing-copy"],[data-role="ing-memo"]').forEach(b => { b.disabled = false; });
}

function updateAllCalcIngredientSets() {
  const recipe = recipes.find(r => r.id === calcRecipeId);
  if (!recipe) return;
  document.querySelectorAll('#calc-ingredient-sets .calc-ing-set').forEach(setDiv => {
    const set = calcIngredientSets.find(s => s.id === setDiv.dataset.setId);
    if (set) updateCalcIngredientSet(set, recipe, setDiv);
  });
}

function formatCalcResult(n) {
  if (Number.isInteger(n)) return String(n);
  // Up to 4 decimal places, trim trailing zeros
  return parseFloat(n.toFixed(4)).toString();
}

document.getElementById('btn-add-calc-set').addEventListener('click', () => {
  const recipe = recipes.find(r => r.id === calcRecipeId);
  if (recipe) addCalcIngredientSet(recipe);
});

function calculate() {
  const recipe = recipes.find(r => r.id === calcRecipeId);
  if (!recipe) return;
  const rawVal = document.getElementById('input-total-amount').value;
  const totalInput = parseFloat(rawVal);
  const unit = document.getElementById('input-unit').value.trim() || '';

  if (!rawVal) {
    document.getElementById('calc-result').style.display = 'none';
    document.getElementById('btn-total-copy').disabled = true;
    document.getElementById('btn-total-memo').disabled = true;
    hideError('calc-error');
    return;
  }
  if (isNaN(totalInput) || totalInput <= 0) {
    showError('calc-error', '希望の総量に0より大きい数値を入力してください。');
    document.getElementById('calc-result').style.display = 'none';
    document.getElementById('btn-total-copy').disabled = true;
    document.getElementById('btn-total-memo').disabled = true;
    return;
  }
  hideError('calc-error');

  const mode        = settings.roundingMode || 'round';
  const ingredients = recipe.ingredients;
  const ratioSum    = ingredients.reduce((s, i) => s + i.ratio, 0);
  const modeLabels  = { round: '四捨五入', floor: '切り捨て', ceil: '切り上げ', approximate: '近似値', none: '端数処理なし' };

  let amounts = [], actualTotal, noteText = '';
  let useNoneMode = false;

  if (mode === 'approximate') {
    // Convert ratios to integers to guarantee integer results
    const rawRatios = ingredients.map(i => i.ratio);
    const maxDec = rawRatios.reduce((m, r) => {
      const s = r.toString(); const d = s.indexOf('.');
      return d === -1 ? m : Math.max(m, s.length - d - 1);
    }, 0);
    const mult = Math.pow(10, maxDec);
    const intRatios = rawRatios.map(r => Math.round(r * mult));
    const intSum = intRatios.reduce((s, r) => s + r, 0);
    const kApprox = totalInput / intSum;
    // Use at least k=1 to guarantee positive results; also check k=0 only when input < intSum/2
    const kLow  = kApprox < 0.5 ? 0 : Math.max(1, Math.floor(kApprox));
    const kHigh = kLow + 1;
    const k = Math.abs(kHigh * intSum - totalInput) <= Math.abs(kLow * intSum - totalInput) ? kHigh : Math.max(1, kLow);
    amounts = intRatios.map(r => r * k);
    actualTotal = amounts.reduce((s, v) => s + v, 0);
    const adj = k * intSum;
    if (Math.abs(adj - totalInput) > 0.0001)
      noteText = `※ 整数で割り切れるよう、総量を ${fmtNum(adj)}${unit} に調整しました`;
  } else if (mode === 'none') {
    useNoneMode = true;
    amounts = ingredients.map(i => (i.ratio / ratioSum) * totalInput);
    actualTotal = totalInput;
  } else {
    const fn = mode === 'floor' ? Math.floor : mode === 'ceil' ? Math.ceil : Math.round;
    amounts = ingredients.map(i => fn((i.ratio / ratioSum) * totalInput));
    actualTotal = amounts.reduce((s, v) => s + v, 0);
    if (Math.abs(actualTotal - totalInput) > 0.0001)
      noteText = `※ 合計が希望量と異なります（実際の合計：${fmtNum(actualTotal)}${unit}）`;
  }

  const rowsEl = document.getElementById('result-rows');
  rowsEl.innerHTML = '';
  ingredients.forEach((ing, idx) => {
    const row = document.createElement('div');
    row.className = 'result-row';
    const valStr = useNoneMode ? fmtNone(amounts[idx]) : fmtNum(amounts[idx]);
    row.innerHTML = `<span class="result-name">${escHtml(ing.name)}</span><span class="result-value">${valStr}${escHtml(unit)}</span>`;
    rowsEl.appendChild(row);
  });

  document.getElementById('result-total-value').textContent = `${fmtNum(actualTotal)}${unit}`;
  document.getElementById('result-mode').textContent = `適用モード：${modeLabels[mode] || mode}`;
  const noteEl = document.getElementById('result-note');
  noteEl.textContent = noteText;
  noteEl.style.display = noteText ? '' : 'none';

  document.getElementById('calc-result').style.display = '';

  // Enable copy/memo buttons now that result is visible
  document.getElementById('btn-total-copy').disabled = false;
  document.getElementById('btn-total-memo').disabled = false;
}

function nowLabel() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `[${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}]`;
}

function tempBtnText(btn, text, restoreMs = 1500) {
  const orig = btn.textContent;
  btn.textContent = text;
  setTimeout(() => { btn.textContent = orig; }, restoreMs);
}

function appendToMemo(text) {
  const recipe = recipes.find(r => r.id === calcRecipeId);
  if (!recipe) return;
  const ta = document.getElementById('calc-memo-textarea');
  const cur = ta.value;
  ta.value = cur ? cur + '\n\n' + text : text;
  ta.style.height = 'auto';
  ta.style.height = Math.max(80, ta.scrollHeight) + 'px';
  recipe.memo = ta.value;
  saveRecipes();
  // update memo copy button state
  document.getElementById('btn-memo-copy').disabled = !ta.value;
}

function getTotalResultText() {
  const unit = document.getElementById('input-unit').value.trim() || '';
  const rows  = [...document.querySelectorAll('#result-rows .result-row')];
  return rows.map(r => {
    const name = r.querySelector('.result-name').textContent;
    const val  = r.querySelector('.result-value').textContent;
    return `${name}: ${val}`;
  }).join(' / ');
}

// ============================================================
// Screen 4: Settings
// ============================================================
function renderSettings() {
  const container = document.getElementById('settings-container');
  container.innerHTML = '';
  SETTINGS_CONFIG.forEach(catDef => {
    const section = document.createElement('div');
    section.className = 'settings-section';
    const catLabel = document.createElement('div');
    catLabel.className = 'settings-category';
    catLabel.textContent = catDef.category;
    section.appendChild(catLabel);
    const card = document.createElement('div');
    card.className = 'settings-card';
    catDef.items.forEach(itemDef => {
      const item = document.createElement('div');
      item.className = 'settings-item';
      if (itemDef.type === 'custom') {
        if (itemDef.render) itemDef.render(item);
      } else {
        const lbl = document.createElement('span');
        lbl.className = 'settings-item-label';
        lbl.textContent = itemDef.label;
        item.appendChild(lbl);
        if (itemDef.type === 'toggle') {
          item.removeChild(lbl);
          const row = document.createElement('label');
          row.className = 'settings-toggle-row';
          const lblInline = document.createElement('span');
          lblInline.className = 'settings-item-label';
          lblInline.style.marginBottom = '0';
          lblInline.textContent = itemDef.label;
          row.appendChild(lblInline);
          const sw = document.createElement('span');
          sw.className = 'settings-toggle-sw';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = !!settings[itemDef.key];
          cb.addEventListener('change', () => { settings[itemDef.key] = cb.checked; saveSettings(); showToast('設定を保存しました'); });
          const slider = document.createElement('span');
          slider.className = 'settings-toggle-slider';
          sw.appendChild(cb); sw.appendChild(slider);
          row.appendChild(sw);
          item.appendChild(row);
          if (itemDef.desc) {
            const descEl = document.createElement('span');
            descEl.className = 'settings-radio-desc';
            descEl.style.display = 'block';
            descEl.style.marginTop = '4px';
            descEl.textContent = itemDef.desc;
            item.appendChild(descEl);
          }
        } else if (itemDef.type === 'radio') {
          const group = document.createElement('div');
          group.className = 'settings-radio-group';
          itemDef.options.forEach(opt => {
            const lEl = document.createElement('label');
            lEl.className = 'settings-radio-label';
            const radio = document.createElement('input');
            radio.type = 'radio'; radio.name = `sr-${itemDef.key}`; radio.value = opt.value;
            if (settings[itemDef.key] === opt.value) radio.checked = true;
            radio.addEventListener('change', () => { if (radio.checked) { settings[itemDef.key] = opt.value; saveSettings(); showToast('設定を保存しました'); } });
            lEl.appendChild(radio);
            const textWrap = document.createElement('span');
            textWrap.className = 'settings-radio-text';
            textWrap.appendChild(document.createTextNode(opt.label));
            if (opt.desc) {
              const descEl = document.createElement('span');
              descEl.className = 'settings-radio-desc';
              descEl.textContent = opt.desc;
              textWrap.appendChild(descEl);
            }
            lEl.appendChild(textWrap);
            group.appendChild(lEl);
          });
          item.appendChild(group);
        }
      }
      card.appendChild(item);
    });
    section.appendChild(card);
    container.appendChild(section);
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ============================================================
// Color utility functions
// ============================================================
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)); };
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}
function hexToHsl(hex) {
  if (!hex || hex.length < 7) return { h: 0, s: 100, l: 50 };
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0; const l = (max+min)/2;
  if (max !== min) {
    const d = max-min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0)) * 60; break;
      case g: h = ((b-r)/d + 2) * 60; break;
      case b: h = ((r-g)/d + 4) * 60; break;
    }
  }
  return { h: Math.round(h), s: Math.round(s*100), l: Math.round(l*100) };
}
function hslToHex(h, s, l) {
  const [r,g,b] = hslToRgb(h,s,l);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}
function getTextColor(hexColor) {
  if (!hexColor || hexColor.length < 7) return '#ffffff';
  const r = parseInt(hexColor.slice(1,3),16)/255, g = parseInt(hexColor.slice(3,5),16)/255, b = parseInt(hexColor.slice(5,7),16)/255;
  return (0.2126*r + 0.7152*g + 0.0722*b) > 0.55 ? '#222222' : '#ffffff';
}
function getTextShadow(hexColor) {
  return getTextColor(hexColor) === '#ffffff'
    ? '0 1px 2px rgba(0,0,0,0.4)'
    : '0 1px 1px rgba(255,255,255,0.6)';
}
function getTagBorderColor(hexColor) {
  if (!hexColor || hexColor.length < 7) return 'rgba(0,0,0,0.2)';
  const r = parseInt(hexColor.slice(1,3),16);
  const g = parseInt(hexColor.slice(3,5),16);
  const b = parseInt(hexColor.slice(5,7),16);
  const d = v => Math.max(0, Math.floor(v * 0.65));
  return `rgb(${d(r)},${d(g)},${d(b)})`;
}

// ============================================================
// Canvas Color Picker
// ============================================================
let _cpH = 0, _cpS = 100, _cpL = 50;
let _cpPickerOpen = false;
let _cpInited     = false;

function cpDraw2D() {
  const canvas = document.getElementById('cp-canvas-2d');
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(W, H);
  const d = img.data;
  for (let y = 0; y < H; y++) {
    const sat = (1 - y/(H-1)) * 100;
    for (let x = 0; x < W; x++) {
      const [r,g,b] = hslToRgb((x/(W-1))*360, sat, _cpL);
      const i = (y*W+x)*4; d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
  }
  ctx.putImageData(img, 0, 0);
  // Cursor
  const cx = (_cpH/360)*W, cy = (1-_cpS/100)*H;
  ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.strokeStyle='white'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke();
}
function cpDrawBright() {
  const canvas = document.getElementById('cp-canvas-bright');
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(W, H);
  const d = img.data;
  for (let y = 0; y < H; y++) {
    const [r,g,b] = hslToRgb(_cpH, _cpS, (1-y/(H-1))*100);
    for (let x = 0; x < W; x++) {
      const i = (y*W+x)*4; d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const thumbY = (1-_cpL/100)*H;
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillRect(-1,thumbY-3,W+2,6);
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1; ctx.strokeRect(-1,thumbY-3,W+2,6);
}
function cpUpdatePreview() {
  const hex = hslToHex(_cpH, _cpS, _cpL);
  tagModalSelectedColor = hex;
  document.getElementById('input-tag-color').value = hex;
  const prev = document.getElementById('cp-preview');
  const sel  = document.getElementById('cp-selected-preview');
  const hexEl = document.getElementById('cp-hex');
  if (prev)  { prev.style.background = hex; prev.style.borderColor = getTagBorderColor(hex); }
  if (sel)   { sel.style.background = hex;  sel.style.borderColor  = getTagBorderColor(hex); }
  if (hexEl) hexEl.textContent = hex;
  renderTagColorPresets();
}
function cpUpdate() { cpDraw2D(); cpDrawBright(); cpUpdatePreview(); }
function cpSetFromHex(hex) {
  const { h, s, l } = hexToHsl(hex);
  _cpH = h; _cpS = s; _cpL = l;
  cpUpdate();
}
function cpInit() {
  if (_cpInited) return;
  _cpInited = true;
  const canvas2d = document.getElementById('cp-canvas-2d');
  const canvasBr = document.getElementById('cp-canvas-bright');
  if (!canvas2d || !canvasBr) return;

  let drag2d = false, dragBr = false;

  function on2D(e) {
    const rect = canvas2d.getBoundingClientRect();
    _cpH = Math.round(Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width))*360);
    _cpS = Math.round((1-Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height)))*100);
    cpUpdate();
  }
  function onBr(e) {
    const rect = canvasBr.getBoundingClientRect();
    _cpL = Math.round((1-Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height)))*100);
    cpUpdate();
  }

  canvas2d.addEventListener('mousedown', e => { drag2d=true; on2D(e); });
  canvas2d.addEventListener('touchstart', e => { e.preventDefault(); on2D(e.touches[0]); }, {passive:false});
  canvas2d.addEventListener('touchmove',  e => { e.preventDefault(); on2D(e.touches[0]); }, {passive:false});

  canvasBr.addEventListener('mousedown', e => { dragBr=true; onBr(e); });
  canvasBr.addEventListener('touchstart', e => { e.preventDefault(); onBr(e.touches[0]); }, {passive:false});
  canvasBr.addEventListener('touchmove',  e => { e.preventDefault(); onBr(e.touches[0]); }, {passive:false});

  document.addEventListener('mousemove', e => { if (drag2d) on2D(e); if (dragBr) onBr(e); });
  document.addEventListener('mouseup',   () => { drag2d=false; dragBr=false; });
}

function fmtNum(n) {
  if (Number.isInteger(n)) return String(n);
  return parseFloat(n.toFixed(4)).toString();
}

function fmtNone(n) {
  // Truncate to 3 decimal places (no rounding)
  const truncated = Math.trunc(n * 1000) / 1000;
  // Check if digits exist beyond 3 decimal places
  const hasMore = Math.abs(n - truncated) > 1e-9;
  // Format: remove trailing zeros after decimal
  let str;
  if (Number.isInteger(truncated)) {
    str = String(truncated);
  } else {
    str = truncated.toFixed(3).replace(/0+$/, '').replace(/\.$/, '');
  }
  return hasMore ? str + '…' : str;
}

// ============================================================
// Custom confirm / alert (replaces native confirm/alert for UI consistency)
// ============================================================
(function() {
  const modal   = document.getElementById('modal-confirm');
  const okBtn   = document.getElementById('btn-confirm-ok');
  const canBtn  = document.getElementById('btn-confirm-cancel');
  let _resolve = null;

  function close() { modal.classList.add('hidden'); _resolve = null; }
  okBtn.addEventListener('click',  () => { const r = _resolve; close(); if (r) r(true);  });
  canBtn.addEventListener('click', () => { const r = _resolve; close(); if (r) r(false); });
  modal.addEventListener('click', (e) => { if (e.target === modal) { const r = _resolve; close(); if (r) r(false); } });

  window.showConfirm = function(msg, title = '確認', okLabel = '実行', danger = true) {
    document.getElementById('modal-confirm-title').textContent = title;
    document.getElementById('modal-confirm-msg').textContent = msg;
    okBtn.textContent = okLabel;
    okBtn.className = 'btn ' + (danger ? 'btn-danger' : 'btn-primary');
    modal.classList.remove('hidden');
    return new Promise(res => { _resolve = res; });
  };
})();

(function() {
  const modal  = document.getElementById('modal-alert');
  const okBtn  = document.getElementById('btn-alert-ok');
  let _resolve = null;

  function close() { modal.classList.add('hidden'); _resolve = null; }
  okBtn.addEventListener('click', () => { const r = _resolve; close(); if (r) r(); });
  modal.addEventListener('click', (e) => { if (e.target === modal) { const r = _resolve; close(); if (r) r(); } });

  window.showAlert = function(msg, title = 'お知らせ') {
    document.getElementById('modal-alert-title').textContent = title;
    document.getElementById('modal-alert-msg').textContent = msg;
    modal.classList.remove('hidden');
    return new Promise(res => { _resolve = res; });
  };
})();
