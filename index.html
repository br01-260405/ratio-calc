<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<title>比率計算アプリ</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/icons/colon-icon-32.svg">
<link rel="icon" type="image/svg+xml" sizes="16x16" href="assets/icons/colon-icon-16.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="比率計算">
<meta name="theme-color" content="#4A90D9">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    font-size: 16px;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }

  .header {
    background: #4A90D9;
    color: #fff;
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .header-left { width: 72px; }
  .header-title {
    font-size: 17px;
    font-weight: 700;
    flex: 1;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 4px;
  }
  .header-right {
    width: 72px;
    display: flex;
    justify-content: flex-end;
  }
  .btn-back, .btn-settings {
    background: none;
    border: none;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    min-height: 44px;
    white-space: nowrap;
  }
  .btn-back:hover, .btn-settings:hover { background: rgba(255,255,255,0.15); }
  .btn-settings { font-size: 20px; }
  .btn-sort {
    background: none;
    border: none;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    min-height: 44px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-sort:hover { background: rgba(255,255,255,0.15); }
  .btn-sort.sort-active { background: rgba(255,255,255,0.28); }

  .screen {
    display: none;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    padding: 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .screen.active { display: block; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    min-height: 44px;
    transition: opacity 0.15s, transform 0.1s;
    gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .btn:disabled:active { transform: none; }
  .btn-primary { background: #4A90D9; color: #fff; }
  .btn-primary:hover { background: #357abd; }
  .btn-secondary { background: #e2e8f0; color: #4a5568; }
  .btn-secondary:hover { background: #cbd5e0; }
  .btn-danger { background: #fc8181; color: #fff; }
  .btn-danger:hover { background: #f56565; }
  .btn-folder { background: #ebf4ff; color: #2b6cb0; }
  .btn-folder:hover { background: #bee3f8; }
  .btn-full { width: 100%; }
  .btn-sm { padding: 8px 10px; font-size: 13px; min-height: 44px; }

  .input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    color: #2d3748;
    background: #fff;
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .input:focus { border-color: #4A90D9; }
  .input-sm { padding: 8px 12px; font-size: 16px; }
  select.input { cursor: pointer; background-image: none; }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 6px;
  }
  .form-group { margin-bottom: 16px; }

  .error-msg {
    background: #fff5f5;
    border: 1px solid #fc8181;
    color: #c53030;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ===== Screen 1: Recipe List ===== */
  .screen-title {
    font-size: 18px;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 16px;
  }
  .recipe-list { display: flex; flex-direction: column; gap: 10px; }
  .recipe-card {
    background: #fff;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .recipe-card:hover, .recipe-card:active { border-color: #4A90D9; box-shadow: 0 2px 8px rgba(74,144,217,0.15); }
  .recipe-info {
    flex: 1;
    cursor: pointer;
    min-width: 0;
  }
  .recipe-name {
    font-size: 15px;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 3px;
  }
  .recipe-summary {
    font-size: 12px;
    color: #718096;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .recipe-actions, .folder-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-recipe-menu {
    background: none;
    border: none;
    color: #a0aec0;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    min-height: 44px;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    letter-spacing: 1px;
  }
  .btn-recipe-menu:hover, .btn-recipe-menu:active { background: #e2e8f0; color: #4a5568; }

  /* ===== Bottom Sheet ===== */
  .sheet-wrapper {
    position: fixed;
    inset: 0;
    z-index: 600;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .sheet-overlay.visible { opacity: 1; }
  .sheet-panel {
    position: relative;
    background: #fff;
    border-radius: 14px 14px 0 0;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.2s ease-out;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }
  .sheet-panel.visible { transform: translateY(0); }
  .sheet-handle-bar {
    width: 36px;
    height: 4px;
    background: #cbd5e0;
    border-radius: 2px;
    margin: 10px auto 8px;
  }
  .sheet-recipe-name {
    font-size: 12px;
    color: #a0aec0;
    text-align: center;
    padding: 0 16px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sheet-item {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    font-size: 16px;
    color: #2d3748;
    cursor: pointer;
    border-top: 1px solid #f0f4f8;
    transition: background 0.12s;
    gap: 12px;
  }
  .sheet-item:hover, .sheet-item:active { background: #f7fafc; }
  .sheet-item.danger { color: #c53030; }
  .sheet-item.danger:hover, .sheet-item.danger:active { background: #fff5f5; }

  /* ===== Duplicate highlight ===== */
  @keyframes recipeHighlight {
    0%   { border-left-color: transparent; }
    8%   { border-left-color: #4A90D9; }
    62%  { border-left-color: #4A90D9; }
    100% { border-left-color: transparent; }
  }
  .recipe-card.highlight-new {
    border-left: 3px solid transparent;
    animation: recipeHighlight 1.3s ease forwards;
  }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: #a0aec0;
  }
  .empty-state p { font-size: 15px; line-height: 1.6; margin-top: 12px; }
  .empty-icon { font-size: 48px; }

  .add-btn-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .add-btn-row .btn { flex: 1; }

  /* ===== Folders ===== */
  .folder-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
  .folder-card {
    background: #F5F8FF;
    border: 2px solid #d0e4f7;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .folder-card:hover, .folder-card:active { border-color: #4A90D9; box-shadow: 0 2px 8px rgba(74,144,217,0.15); }
  .folder-icon { font-size: 22px; flex-shrink: 0; cursor: pointer; }
  .folder-info { flex: 1; cursor: pointer; min-width: 0; }
  .folder-name { font-size: 15px; font-weight: 700; color: #2d3748; }
  .folder-count { font-size: 12px; color: #718096; margin-top: 2px; }

  .list-section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 10px;
  }
  .list-section-divider::before,
  .list-section-divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
  .list-section-label { font-size: 12px; color: #a0aec0; font-weight: 600; white-space: nowrap; }
  .all-organized {
    text-align: center;
    padding: 20px 16px;
    color: #a0aec0;
    font-size: 14px;
  }
  .recipe-list-outer {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px;
    background: #f7fafc;
  }

  /* ===== Screen 2: Recipe Form ===== */
  .section-label {
    font-size: 15px;
    font-weight: 700;
    color: #4a5568;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid #e2e8f0;
  }
  .ingredient-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .ingredient-name { flex: 2; }
  .ingredient-ratio { flex: 1; }
  .btn-remove-ingredient {
    background: none;
    border: 2px solid #fc8181;
    color: #fc8181;
    border-radius: 8px;
    width: 36px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-remove-ingredient:hover { background: #fff5f5; }
  .btn-remove-ingredient:disabled { opacity: 0.3; cursor: not-allowed; }
  #ingredients-container { margin-bottom: 10px; }
  .form-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }

  /* ===== Screen 3: Calculate ===== */
  .calc-recipe-name {
    font-size: 20px;
    font-weight: 700;
    color: #4A90D9;
    margin-bottom: 12px;
  }
  .ratio-info {
    background: #f7fafc;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #718096;
  }
  .ratio-info-title { font-weight: 700; color: #4a5568; margin-bottom: 6px; font-size: 13px; }
  .ratio-badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .ratio-badge {
    background: #ebf4ff;
    color: #2b6cb0;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .input-row .form-group { flex: 2; margin-bottom: 0; }
  .input-row .form-group:last-child { flex: 1; }

  .result-card {
    background: #f7fafc;
    border: 2px solid #bee3f8;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
  }
  .result-title { font-size: 15px; font-weight: 700; color: #2b6cb0; margin-bottom: 12px; }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #e2e8f0;
    font-size: 15px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-name { color: #4a5568; }
  .result-value { font-weight: 700; color: #2d3748; font-size: 17px; }
  .result-total {
    background: #ebf4ff;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-weight: 700;
  }
  .result-total-label { color: #2b6cb0; font-size: 15px; }
  .result-total-value { color: #2b6cb0; font-size: 18px; }
  .result-mode { font-size: 12px; color: #a0aec0; text-align: right; margin-top: 8px; }
  .result-note {
    background: #fffbeb;
    border: 1px solid #f6e05e;
    color: #744210;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* ===== Screen 4: Settings ===== */
  .settings-section { margin-bottom: 24px; }
  .settings-category {
    font-size: 13px;
    font-weight: 700;
    color: #4A90D9;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .settings-card { background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
  .settings-item { padding: 14px 16px; border-bottom: 1px solid #f0f4f8; }
  .settings-item:last-child { border-bottom: none; }
  .settings-item-label { font-size: 15px; font-weight: 600; color: #2d3748; margin-bottom: 8px; display: block; }
  .settings-select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 16px;
    color: #2d3748;
    background: #fff;
    outline: none;
    cursor: pointer;
  }
  .settings-select:focus { border-color: #4A90D9; }
  .settings-radio-group { display: flex; flex-direction: column; gap: 8px; }
  .settings-radio-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    font-size: 15px;
    color: #2d3748;
    padding: 6px 0;
  }
  .settings-radio-label input[type="radio"] { width: 18px; height: 18px; accent-color: #4A90D9; margin-top: 1px; flex-shrink: 0; }
  .settings-radio-text { display: flex; flex-direction: column; }
  .settings-radio-desc { font-size: 0.8em; color: #718096; margin-top: 3px; line-height: 1.4; }
  .settings-reset-wrap { margin-top: 8px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d3748;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .divider { height: 1px; background: #e2e8f0; margin: 16px 0; }

  /* ===== Drag & Drop ===== */
  .drag-handle {
    color: #aaa;
    font-size: 20px;
    line-height: 1;
    cursor: grab;
    min-width: 36px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    touch-action: none;
    user-select: none;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
  }
  .drag-handle:hover { color: #4A90D9; background: #ebf4ff; }
  .drag-handle:active { cursor: grabbing; }
  .recipe-card.dragging, .folder-card.dragging { opacity: 0.45; box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
  .recipe-card.drag-over-top,  .folder-card.drag-over-top    { border-top: 3px solid #4A90D9 !important; }
  .recipe-card.drag-over-bottom, .folder-card.drag-over-bottom { border-bottom: 3px solid #4A90D9 !important; }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal-title { font-size: 17px; font-weight: 700; color: #2d3748; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; }
  .modal-actions.vertical { flex-direction: column; gap: 8px; }
  .modal-actions.vertical .btn { width: 100%; }

  .move-options-list { max-height: 280px; overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y; margin: 0 -4px; }
  .move-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    color: #2d3748;
    transition: background 0.15s;
  }
  .move-option:hover, .move-option:active { background: #f7fafc; }
  .move-option.selected { background: #ebf4ff; color: #2b6cb0; font-weight: 600; }
  .move-option-icon { font-size: 18px; }

  /* ===== Recipe Form Modal (bottom sheet) ===== */
  .recipe-form-modal {
    position: fixed;
    inset: 0;
    z-index: 700;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .recipe-form-modal.visible {
    pointer-events: auto;
    opacity: 1;
  }
  .recipe-form-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
  }
  .recipe-form-panel {
    position: relative;
    width: 100%;
    max-width: 480px;
    max-height: 85dvh;
    background: #fff;
    border-radius: 14px 14px 0 0;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.25s ease-out;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  }
  .recipe-form-panel.visible {
    transform: translateY(0);
  }
  .recipe-form-handle {
    display: flex;
    justify-content: center;
    padding: 10px 0 2px;
    flex-shrink: 0;
  }
  .recipe-form-handle-bar {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: #cbd5e0;
  }
  .recipe-form-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid #e2e8f0;
  }
  .recipe-form-title-text {
    font-size: 17px;
    font-weight: 700;
    color: #2d3748;
  }
  .recipe-form-close-btn {
    background: none;
    border: none;
    font-size: 18px;
    color: #718096;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    min-height: 44px;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .recipe-form-close-btn:hover, .recipe-form-close-btn:active { background: #f7fafc; color: #2d3748; }
  .recipe-form-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .form-details-toggle {
    display: block;
    width: 100%;
    background: none;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 13px;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    text-align: left;
    margin: 10px 0 0;
    transition: background 0.15s;
    min-height: 44px;
  }
  .form-details-toggle:hover, .form-details-toggle:active { background: #f7fafc; }
  .form-details-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.2s ease-out;
  }

  /* ===== Tags ===== */
  .recipe-tags-display {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }
  .tag-chip-sm {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  /* Tag chips in form */
  .form-tag-section-label {
    font-size: 14px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 8px;
    display: block;
  }
  .form-tag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .tag-chip-form {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    color: #fff;
    opacity: 0.38;
    transition: opacity 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    user-select: none;
    pointer-events: auto;
  }
  .tag-chip-form * { pointer-events: none; }
  .tag-chip-form.selected {
    opacity: 1;
    box-shadow: 0 1px 6px rgba(0,0,0,0.22);
  }
  .tag-chip-form:hover { opacity: 0.8; }
  .tag-chip-form.selected:hover { opacity: 0.9; }
  .tag-chip-add {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px dashed #cbd5e0;
    background: transparent;
    color: #718096;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .tag-chip-add:hover { border-color: #4A90D9; color: #4A90D9; }

  /* ===== Tag filter area (always visible) ===== */
  .tag-filter-area {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .tag-filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag-filter-group-label {
    font-size: 11px;
    font-weight: 700;
    color: #a0aec0;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 32px;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    padding: 7px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    opacity: 0.38;
    transition: opacity 0.15s, box-shadow 0.15s;
    user-select: none;
    white-space: nowrap;
    min-height: 36px;
  }
  .filter-chip.active { opacity: 1; box-shadow: 0 1px 6px rgba(0,0,0,0.22); }
  .filter-chip:hover { opacity: 0.75; }
  .filter-chip.active:hover { opacity: 0.88; }

  /* Tag modal */
  .tag-color-presets {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .tag-preset-swatch {
    width: 100%;
    aspect-ratio: 1;
    min-width: 32px;
    min-height: 32px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .tag-preset-swatch:hover { transform: scale(1.1); }
  .tag-preset-swatch:active { transform: scale(1.05); border-color: #333; }
  .tag-preset-swatch.selected { border-color: #333; transform: scale(1.05); }
  .tag-color-input {
    width: 52px;
    height: 44px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    cursor: pointer;
    padding: 2px;
    background: none;
  }
  .tag-scope-option {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #2d3748;
    padding: 5px 0;
    font-weight: normal;
    margin-bottom: 0;
  }
  .tag-scope-option input[type="radio"] { width: 16px; height: 16px; accent-color: #4A90D9; flex-shrink: 0; }
  .tag-scope-folders {
    margin-top: 8px;
    padding: 8px 12px;
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    max-height: 140px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    transition: opacity 0.15s;
  }
  .tag-scope-folders.all-mode {
    opacity: 0.4;
    pointer-events: none;
  }
  .tag-scope-folder-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 14px;
    color: #2d3748;
    cursor: pointer;
    font-weight: normal;
    margin-bottom: 0;
  }
  .tag-scope-folder-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #4A90D9; flex-shrink: 0; }
  .tag-scope-folder-item.disabled {
    color: #a0aec0;
    cursor: default;
  }
  .tag-scope-folder-item.disabled input[type="checkbox"] {
    opacity: 0.4;
    pointer-events: none;
  }

  /* Tag management in settings */
  .tag-mgmt-group-header { font-size: 12px; font-weight: 700; color: #718096; letter-spacing: 0.05em; padding: 10px 0 4px; }
  .tag-mgmt-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
  .tag-mgmt-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #f7fafc;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    transition: border-color 0.1s;
  }
  .tag-mgmt-item.dragging { opacity: 0.4; }
  .tag-mgmt-item.drag-over-top    { border-top:    3px solid #4A90D9; }
  .tag-mgmt-item.drag-over-bottom { border-bottom: 3px solid #4A90D9; }
  .tag-mgmt-handle { cursor: grab; color: #cbd5e0; font-size: 18px; padding: 0 2px; flex-shrink: 0; user-select: none; touch-action: none; }
  .tag-mgmt-handle:hover { color: #718096; }
  .tag-mgmt-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .tag-mgmt-info { flex: 1; min-width: 0; }
  .tag-mgmt-name { font-size: 14px; font-weight: 600; color: #2d3748; }
  .tag-mgmt-scope { font-size: 11px; color: #a0aec0; margin-top: 2px; }
  .tag-mgmt-empty { text-align: center; padding: 16px 0; color: #a0aec0; font-size: 14px; }
  /* Calc header row with home button */
  .calc-header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .calc-header-row .calc-recipe-name { margin-bottom: 0; flex: 1; min-width: 0; }
  .btn-calc-home { background: #e2e8f0; color: #4a5568; border: none; border-radius: 8px; padding: 6px 12px; font-size: 14px; font-weight: 600; cursor: pointer; flex-shrink: 0; min-height: 44px; }
  .btn-calc-home:hover, .btn-calc-home:active { background: #cbd5e0; }
  /* Settings toggle switch */
  .settings-toggle-row { display: flex; align-items: center; justify-content: space-between; cursor: pointer; width: 100%; }
  .settings-toggle-sw { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .settings-toggle-sw input { opacity: 0; width: 0; height: 0; position: absolute; }
  .settings-toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e0; border-radius: 24px; transition: .2s; }
  .settings-toggle-sw input:checked + .settings-toggle-slider { background: #4A90D9; }
  .settings-toggle-slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .settings-toggle-sw input:checked + .settings-toggle-slider::before { transform: translateX(20px); }

  /* ===== Ingredient-based calc ===== */
  .calc-ingredient-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 12px;
    color: #a0aec0;
    font-size: 13px;
  }
  .calc-ingredient-divider::before,
  .calc-ingredient-divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
  .amount-btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .btn-amount {
    flex: 1;
    min-width: 48px;
    padding: 6px 4px;
    background: #ebf4ff;
    color: #2b6cb0;
    border: 1px solid #bee3f8;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-height: 44px;
  }
  .btn-amount:hover, .btn-amount:active { background: #bee3f8; }
  .btn-amount-reset {
    background: #fff5f5;
    color: #c53030;
    border-color: #fed7d7;
  }
  .btn-amount-reset:hover { background: #fed7d7; }
  .total-amount-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .total-amount-lbl {
    font-size: 13px;
    font-weight: 600;
    color: #4a5568;
    white-space: nowrap;
    flex-shrink: 0;
    margin-bottom: 0;
  }
  .total-amount-inp {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    font-size: 16px;
  }
  .unit-inp {
    width: 52px;
    flex-shrink: 0;
    padding: 8px 6px;
    font-size: 16px;
  }
  .btn-save-amount-btn {
    flex-shrink: 0;
    padding: 8px 12px;
    background: #4A90D9;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    min-height: 38px;
  }
  .btn-save-amount-btn:hover { background: #357abd; }
  .btn-save-amount-btn:active { transform: scale(0.97); }
  .saved-amounts-label {
    font-size: 13px;
    font-weight: 600;
    color: #718096;
    margin-bottom: 6px;
  }
  .saved-amounts-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .saved-amount-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #ebf4ff;
    border: 1px solid #bee3f8;
    border-radius: 16px;
    padding: 4px 10px 4px 12px;
    font-size: 13px;
    font-weight: 600;
    color: #2b6cb0;
    cursor: pointer;
  }
  .saved-amount-chip:hover { background: #bee3f8; }
  .saved-amount-chip-del {
    background: none;
    border: none;
    color: #90cdf4;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    margin-left: 2px;
  }
  .saved-amount-chip-del:hover { color: #c53030; }
  .calc-ing-set {
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .calc-ing-set-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }
  .btn-remove-calc-set {
    background: none;
    border: none;
    color: #a0aec0;
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .btn-remove-calc-set:hover { color: #c53030; }
  .calc-ing-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .calc-ing-row:last-child { margin-bottom: 0; }
  .calc-ing-name {
    font-size: 14px;
    font-weight: 600;
    color: #4a5568;
    min-width: 44px;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .calc-ing-input { width: 88px; flex-shrink: 0; }
  .calc-ing-results {
    font-size: 13px;
    color: #4a5568;
    flex: 1;
    min-width: 0;
    word-break: break-all;
  }

  @media (min-width: 480px) {
    body { background: #e2e8f0; }
    #app { border-radius: 0; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
  }

  /* Search bar */
  .search-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f7fafc;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    padding: 0 10px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .search-bar-wrap:focus-within { border-color: #4A90D9; background: #fff; }
  .search-icon { font-size: 15px; color: #a0aec0; flex-shrink: 0; }
  .search-bar-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 16px;
    color: #2d3748;
    padding: 10px 0;
    outline: none;
    min-width: 0;
  }
  .search-bar-input::placeholder { color: #a0aec0; }
  .search-clear-btn {
    background: none;
    border: none;
    color: #a0aec0;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    line-height: 1;
    min-height: 44px;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .search-clear-btn:hover { color: #4a5568; }

  /* Memo */
  .calc-memo-section {
    margin-top: 14px;
  }
  .calc-memo-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 6px;
  }
  .calc-memo-textarea {
    resize: none;
    min-height: 80px;
    overflow: hidden;
    line-height: 1.6;
    width: 100%;
  }

  /* ===== Tag Sort Mode ===== */
  #tag-sort-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 150;
  }
  #tag-filter-bar.sort-active {
    position: relative;
    z-index: 200;
    background: #fff;
    padding: 6px 8px;
    margin: -6px -8px;
    border-radius: 10px;
  }
  .tag-sort-btn-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tag-filter-section-title {
    flex: 1;
    font-size: 11px;
    font-weight: 700;
    color: #a0aec0;
    white-space: nowrap;
  }
  .tag-search-mode-btn {
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    min-height: 26px;
    line-height: 1;
    color: #fff;
    background: #4A90D9;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }
  .tag-search-mode-btn.and-mode { background: #f60929; }
  .tag-search-mode-btn:hover { opacity: 0.85; }
  .tag-filter-outer {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px 12px 12px;
    background: #f7fafc;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sort-active .tag-filter-outer {
    border: none;
    border-radius: 0;
    padding: 0;
    background: none;
    margin-bottom: 0;
    gap: 0;
  }
  .tag-filter-group-box {
    border: 1px solid #edf2f7;
    border-radius: 8px;
    padding: 8px;
    background: #fff;
  }
  .tag-filter-box-label {
    font-size: 11px;
    font-weight: 700;
    color: #a0aec0;
    display: block;
    margin-bottom: 5px;
  }
  .btn-tag-sort {
    background: #e2e8f0;
    color: #4a5568;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    min-height: 44px;
  }
  .btn-tag-sort:hover, .btn-tag-sort:active { background: #cbd5e0; }
  .btn-tag-sort.done { background: #4A90D9; color: #fff; }
  .btn-tag-sort.done:hover, .btn-tag-sort.done:active { background: #357abd; }
  .filter-chip.sort-draggable {
    cursor: grab;
    touch-action: none;
    user-select: none;
  }
  .filter-chip.sort-draggable:active { cursor: grabbing; }
  .filter-chip-placeholder {
    display: inline-flex;
    border-radius: 20px;
    visibility: hidden;
    flex-shrink: 0;
  }
  .tag-chip-floating {
    position: fixed;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    opacity: 1;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transform: scale(1.08);
    cursor: grabbing;
    pointer-events: none;
    z-index: 400;
  }

  /* ===== List sort mode (recipe/folder float+swap) ===== */
  .recipe-card.list-sort-dragging,
  .folder-card.list-sort-dragging { opacity: 0.4; }
  .list-sort-float-card {
    position: fixed;
    z-index: 400;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transform: scale(1.02);
    opacity: 0.97;
    border-radius: 12px;
    box-sizing: border-box;
    margin: 0 !important;
  }

  /* ===== Result action buttons ===== */
  .result-action-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .result-action-row .btn { flex: 1; }

  /* ===== Memo header row ===== */
  .calc-memo-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .calc-memo-header .calc-memo-label { margin-bottom: 0; }

  /* ===== Mobile: touch active feedback ===== */
  @media (hover: none) {
    .btn-primary:hover    { background: #4A90D9; }
    .btn-primary:active   { background: #357abd; }
    .btn-secondary:hover  { background: #e2e8f0; }
    .btn-secondary:active { background: #cbd5e0; }
    .btn-danger:hover     { background: #fc8181; }
    .btn-danger:active    { background: #f56565; }
    .btn-folder:hover     { background: #ebf4ff; }
    .btn-folder:active    { background: #bee3f8; }
    .recipe-card:hover    { border-color: #e2e8f0; box-shadow: none; }
    .recipe-card:active   { border-color: #4A90D9; box-shadow: 0 2px 8px rgba(74,144,217,0.15); }
    .folder-card:hover    { border-color: #d0e4f7; box-shadow: none; }
    .folder-card:active   { border-color: #4A90D9; box-shadow: 0 2px 8px rgba(74,144,217,0.15); }
    .btn-calc-home:hover  { background: #e2e8f0; }
    .btn-calc-home:active { background: #cbd5e0; }
    .btn-amount:hover     { background: #ebf4ff; }
    .btn-amount:active    { background: #bee3f8; }
    .btn-amount-reset:hover  { background: #fff5f5; }
    .btn-amount-reset:active { background: #fed7d7; }
    .btn-save-amount-btn:hover  { background: #4A90D9; }
    .btn-save-amount-btn:active { background: #357abd; }
    .btn-remove-ingredient:hover { background: transparent; }
    .btn-remove-ingredient:active { background: #fff5f5; }
    .filter-chip:hover  { opacity: 0.38; }
    .filter-chip:active { opacity: 0.75; }
    .filter-chip.active:hover  { opacity: 1; }
    .filter-chip.active:active { opacity: 0.88; }
  }

  /* ===== Bulk Edit ===== */
  .bulk-hint-text {
    display: block;
    text-align: right;
    font-size: 11px;
    color: #a0aec0;
    margin-bottom: 4px;
    min-height: 18px;
  }
  .bulk-control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    min-height: 36px;
    gap: 8px;
  }
  .btn-bulk-toggle {
    background: #e2e8f0;
    color: #4a5568;
    border: none;
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-height: 36px;
  }
  .btn-bulk-toggle.done { background: #4A90D9; color: #fff; }
  .bulk-checkbox-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    min-height: 44px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .bulk-checkbox-wrap input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #4A90D9;
    pointer-events: none;
  }
  .bulk-edit-active .drag-handle { visibility: hidden; pointer-events: none; }
  .recipe-card.bulk-checked { background: #ebf4ff; border-color: #4A90D9 !important; }
  .folder-card.bulk-checked { background: #dceeff; border-color: #4A90D9 !important; }

  #bulk-action-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-top: 1px solid #e2e8f0;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 300;
    transition: transform 0.2s ease-out;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
  }
  #bulk-action-bar.visible { transform: translateX(-50%) translateY(0); }
  .btn-bulk-select-all {
    background: none;
    border: none;
    color: #4A90D9;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    min-height: 44px;
  }
  .bulk-count-label { font-size: 12px; color: #718096; flex: 1; text-align: center; }
  .bulk-bar-actions { display: flex; gap: 8px; }
  .bulk-bar-actions .btn { flex: 1; padding: 10px 6px; font-size: 13px; min-height: 44px; }
  .screen.bulk-bar-open { padding-bottom: max(80px, calc(70px + env(safe-area-inset-bottom))); }

  /* ===== Mobile: narrow screen layout ===== */
  @media (max-width: 380px) {
    .ingredient-row { flex-wrap: wrap; }
    .ingredient-name  { flex: 1 1 55%; min-width: 0; }

    .calc-ing-name { max-width: 70px; font-size: 13px; }
    .calc-ing-input { width: 76px; }
  }
</style>
</head>
<body>

<script>
'use strict';

// ============================================================
// Constants & Config
// ============================================================
const STORAGE_KEYS = {
  recipes:  'ratioApp_recipes',
  settings: 'ratioApp_settings',
  folders:  'ratioApp_folders',
  tags:     'ratioApp_tags'
};

const TAG_PRESET_COLORS = [
  '#e74c3c','#e8601a','#e67e22','#e8a020',
  '#f1c40f','#c8d400','#7dbb42','#27ae60',
  '#1abc9c','#00b5c8','#3498db','#2980b9',
  '#1a6fcc','#5c6bc0','#9b59b6','#8e44ad',
  '#c2185b','#e91e63','#f06292','#795548',
  '#9e9e9e','#607d8b','#34495e','#2c3e50'
];

const SETTINGS_CONFIG = [
  {
    category: '計算設定',
    items: [
      {
        key: 'roundingMode',
        label: '端数処理モード',
        type: 'radio',
        options: [
          { value: 'round',       label: '四捨五入',    desc: '小数第1位を四捨五入して整数で表示します（例：33.5g → 34g）' },
          { value: 'floor',       label: '切り捨て',    desc: '小数点以下を切り捨てて整数で表示します（例：33.7g → 33g）' },
          { value: 'ceil',        label: '切り上げ',    desc: '小数点以下を切り上げて整数で表示します（例：33.1g → 34g）' },
          { value: 'approximate', label: '近似値',      desc: '比率を整数倍して全材料が整数になるよう調整します。入力値に最も近い倍数を選択するため、実際の合計量は入力値と異なる場合があります（例：比率2:3:5の場合、k倍された10:15:25のような整数になります）' },
          { value: 'none',        label: '端数処理なし', desc: '小数点以下3桁まで表示します。割り切れない場合は末尾に「…」を付けます（例：3.333…g）' }
        ],
        default: 'round'
      }
    ]
  },
  {
    category: 'タグ管理',
    items: [
      {
        key: '_tagManagement',
        label: '',
        type: 'custom',
        render: (el) => renderTagManagementUI(el)
      }
    ]
  },
  {
    category: 'アプリ設定',
    items: [
      {
        key: 'lastRecipe',
        label: '起動時に最後のレシピを開く',
        type: 'toggle',
        default: false,
        desc: 'ONにすると次回起動時に最後に開いた計算画面が直接表示されます。「← 戻る」で一覧に戻れます。'
      }
    ]
  },
  {
    category: 'データ管理',
    items: [
      {
        key: '_exportImport',
        label: '',
        type: 'custom',
        render: (el) => renderExportImportUI(el)
      }
    ]
  }
];

// ============================================================
// State
// ============================================================
let recipes  = [];
let folders  = [];
let tags     = [];
let settings = {};
let currentRecipeId   = null;
let calcRecipeId      = null;
let currentFolderView = null;
let isComposing        = false;
let isSearchComposing  = false;
let searchQuery        = '';

// Drag & Drop
let dragSrcId        = null;
let dragSrcType      = null;
let touchDragSrcId   = null;
let touchDragSrcType = null;
let touchDragCard    = null;

// Folder modal
let folderModalMode     = 'create';
let folderModalTargetId = null;

// Ingredient calc sets
let calcIngredientSets = [];

// Tag state
let activeTagFilter    = new Set();
let formSelectedTagIds = [];
let tagModalMode       = 'create';
let tagModalTargetId   = null;
let tagModalCallback   = null;
let tagModalSelectedColor = TAG_PRESET_COLORS[0];
let tagBulkDeleteMode  = false;
const checkedTagIds    = new Set();

// Tag sort mode
let tagSortMode        = false;
let tagSortDragSrcId   = null;
let tagSortDragGroup   = null;
let tagSortFloatEl     = null;
let tagSortPlaceholder = null;
let tagSortSrcChip     = null;

// ============================================================
// Storage
// ============================================================
function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_KEYS.recipes);
    recipes = r ? JSON.parse(r) : [];
  } catch { recipes = []; }

  try {
    const f = localStorage.getItem(STORAGE_KEYS.folders);
    folders = f ? JSON.parse(f) : [];
  } catch { folders = []; }

  try {
    const t = localStorage.getItem(STORAGE_KEYS.tags);
    tags = t ? JSON.parse(t) : [];
  } catch { tags = []; }

  try {
    const s = localStorage.getItem(STORAGE_KEYS.settings);
    settings = s ? JSON.parse(s) : {};
  } catch { settings = {}; }

  SETTINGS_CONFIG.forEach(cat => cat.items.forEach(item => {
    if (item.key && item.default !== undefined && settings[item.key] === undefined)
      settings[item.key] = item.default;
  }));
  if (settings.tagSearchMode === undefined) settings.tagSearchMode = 'or';

  // Migrations
  recipes = recipes.map((recipe, index) => ({
    ...recipe,
    order:    recipe.order    !== undefined ? recipe.order    : index,
    folderId: recipe.folderId !== undefined ? recipe.folderId : null,
    tagIds:       recipe.tagIds       || [],
    savedAmounts: recipe.savedAmounts || [],
    memo:         recipe.memo         || ''
  }));
  tags = tags.map((tag, index) => ({
    ...tag,
    order: tag.order !== undefined ? tag.order : index
  }));
  folders = folders.map((folder, index) => ({
    ...folder,
    order: folder.order !== undefined ? folder.order : index
  }));
}

function saveRecipes()  { localStorage.setItem(STORAGE_KEYS.recipes,  JSON.stringify(recipes));  }
function saveFolders()  { localStorage.setItem(STORAGE_KEYS.folders,  JSON.stringify(folders));  }
function saveSettings() { localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(settings)); }
function saveTags()     { localStorage.setItem(STORAGE_KEYS.tags,     JSON.stringify(tags));     }

// ============================================================
// Navigation
// ============================================================
const screens = {
  list:     document.getElementById('screen-list'),
  calc:     document.getElementById('screen-calc'),
  settings: document.getElementById('screen-settings')
};
const btnBack           = document.getElementById('btn-back');
const btnSettingsHeader = document.getElementById('btn-settings');

let historyStack = ['list'];

function showScreen(name, push = true) {
  const domName = (name === 'folder-view') ? 'list' : name;
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[domName].classList.add('active');
  if (push && historyStack[historyStack.length - 1] !== name) {
    historyStack.push(name);
  }
  btnBack.style.display = historyStack.length > 1 ? '' : 'none';
  btnSettingsHeader.style.display = name === 'settings' ? 'none' : '';
  const _btnSort = document.getElementById('btn-sort');
  if (_btnSort) _btnSort.style.display = (name === 'list' || name === 'folder-view') ? '' : 'none';
  updateHeaderTitle(name);
}

function updateHeaderTitle(screenName) {
  const el = document.getElementById('header-title');
  if (screenName === 'folder-view' && currentFolderView) {
    const f = folders.find(f => f.id === currentFolderView);
    el.textContent = f ? f.name : 'フォルダ';
  } else {
    el.textContent = '比率計算アプリ';
  }
}

function clearTagSortMode() {
  if (tagSortMode) {
    tagSortMode = false;
    const ov = document.getElementById('tag-sort-overlay');
    if (ov) ov.remove();
    const bar = document.getElementById('tag-filter-bar');
    if (bar) bar.classList.remove('sort-active');
    const btnSort = document.getElementById('btn-sort');
    if (btnSort) { btnSort.textContent = '⇅'; btnSort.classList.remove('sort-active'); }
  }
}

function goBack() {
  if (historyStack.length <= 1) return;
  clearTagSortMode();
  clearBulkEditState();
  historyStack.pop();
  const prev = historyStack[historyStack.length - 1];
  if (prev === 'list') {
    currentFolderView = null;
    activeTagFilter = new Set();
    searchQuery = '';
    const si = document.getElementById('recipe-search');
    if (si) { si.value = ''; document.getElementById('recipe-search-clear').style.display = 'none'; }
    renderRecipeList();
  } else if (prev === 'folder-view') {
    renderRecipeList();
  } else if (prev === 'settings') {
    renderSettings();
  }
  showScreen(prev, false);
}

btnBack.addEventListener('click', goBack);

// ============================================================
// IME helper
// ============================================================
function attachIMEGuard(input, onEnter) {
  input.addEventListener('compositionstart', () => { isComposing = true; });
  input.addEventListener('compositionend',   () => { isComposing = false; });
  if (onEnter) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.isComposing || isComposing)) { e.preventDefault(); return; }
      if (e.key === 'Enter') onEnter(e);
    });
  }
}

// ============================================================
// Tag helpers
// ============================================================
function getTagsForContext(folderId) {
  return tags.filter(t =>
    t.scope === 'all' ||
    (Array.isArray(t.scope) && folderId && t.scope.includes(folderId))
  );
}

function getScopeLabel(scope) {
  if (scope === 'all') return 'すべて';
  if (!Array.isArray(scope) || scope.length === 0) return 'スコープなし';
  const names = scope.map(id => {
    const f = folders.find(f => f.id === id);
    return f ? f.name : null;
  }).filter(Boolean);
  return names.length > 0 ? names.join(', ') : 'スコープなし';
}

function getTagById(id) { return tags.find(t => t.id === id); }

function buildTagGroups() {
  const sortedFolders = [...folders].sort((a, b) => a.order - b.order);
  const groups = [];
  sortedFolders.forEach(folder => {
    const folderTags = tags
      .filter(t => Array.isArray(t.scope) && t.scope.includes(folder.id))
      .sort((a, b) => a.order - b.order);
    if (folderTags.length > 0) groups.push({ label: folder.name, tags: folderTags });
  });
  const commonTags = tags
    .filter(t => t.scope === 'all' || (Array.isArray(t.scope) && t.scope.length === 0))
    .sort((a, b) => a.order - b.order);
  if (commonTags.length > 0) groups.push({ label: '共通', tags: commonTags });
  return groups;
}

function getFilteredRecipes(list) {
  if (activeTagFilter.size === 0) return list;
  const isAnd = (settings.tagSearchMode || 'or') === 'and';
  if (isAnd) {
    return list.filter(r => r.tagIds && [...activeTagFilter].every(id => r.tagIds.includes(id)));
  }
  return list.filter(r => r.tagIds && r.tagIds.some(id => activeTagFilter.has(id)));
}

function getSearchedRecipes(list) {
  if (!searchQuery) return list;
  const q = searchQuery.toLowerCase();
  return list.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.ingredients.some(i => i.name.toLowerCase().includes(q))
  );
}

// ============================================================
// Tag Filter Bar (always visible, grouped)
// ============================================================
function renderTagFilterBar() {
  const bar = document.getElementById('tag-filter-bar');
  if (!bar) return;
  bar.innerHTML = '';

  // Determine content
  let contextTags = null;
  let groups = null;
  if (currentFolderView !== null) {
    contextTags = getTagsForContext(currentFolderView).sort((a, b) => a.order - b.order);
    if (contextTags.length === 0) return;
  } else {
    if (tags.length === 0) return;
    groups = buildTagGroups();
    if (groups.length === 0) return;
  }

  if (tagSortMode) bar.classList.add('sort-active');
  else bar.classList.remove('sort-active');

  // Outer wrapper (visual in normal mode, transparent in sort-active via CSS)
  const outer = document.createElement('div');
  outer.className = 'tag-filter-outer';

  // Button row: [title (flex:1)] [OR/AND] [並べ替え]
  const btnRow = document.createElement('div');
  btnRow.className = 'tag-sort-btn-row';
  const titleSpan = document.createElement('span');
  titleSpan.className = 'tag-filter-section-title';
  titleSpan.textContent = 'タグで絞り込み';
  btnRow.appendChild(titleSpan);
  if (!tagSortMode) btnRow.appendChild(makeOrAndToggle());
  outer.appendChild(btnRow);

  if (contextTags !== null) {
    // ── Folder view: flat chip list ──
    if (tagSortMode) {
      const area = document.createElement('div');
      area.className = 'tag-filter-area';
      const row = document.createElement('div');
      row.className = 'tag-filter-row';
      const folderGroup = { label: '__folder__', tags: contextTags };
      contextTags.forEach(tag => row.appendChild(makeSortChip(tag, folderGroup)));
      area.appendChild(row);
      outer.appendChild(area);
    } else {
      const row = document.createElement('div');
      row.className = 'tag-filter-row';
      contextTags.forEach(tag => row.appendChild(makeFilterChip(tag)));
      outer.appendChild(row);
    }
  } else {
    // ── Main list ──
    if (tagSortMode) {
      // Sort mode: flat rows with group labels (needed for drag-and-drop)
      const area = document.createElement('div');
      area.className = 'tag-filter-area';
      groups.forEach(group => {
        const row = document.createElement('div');
        row.className = 'tag-filter-row';
        const lbl = document.createElement('span');
        lbl.className = 'tag-filter-group-label';
        lbl.textContent = group.label;
        row.appendChild(lbl);
        group.tags.forEach(tag => row.appendChild(makeSortChip(tag, group)));
        area.appendChild(row);
      });
      outer.appendChild(area);
    } else {
      // Normal mode: folder groups in inner boxes, common tags flat
      const folderGroups = groups.filter(g => g.label !== '共通');
      const commonGroup  = groups.find(g => g.label === '共通');

      folderGroups.forEach(group => {
        const box = document.createElement('div');
        box.className = 'tag-filter-group-box';
        const lbl = document.createElement('span');
        lbl.className = 'tag-filter-box-label';
        lbl.textContent = group.label;
        box.appendChild(lbl);
        const row = document.createElement('div');
        row.className = 'tag-filter-row';
        group.tags.forEach(tag => row.appendChild(makeFilterChip(tag)));
        box.appendChild(row);
        outer.appendChild(box);
      });

      if (commonGroup) {
        const row = document.createElement('div');
        row.className = 'tag-filter-row';
        if (folderGroups.length > 0) {
          const lbl = document.createElement('span');
          lbl.className = 'tag-filter-group-label';
          lbl.textContent = '共通';
          row.appendChild(lbl);
        }
        commonGroup.tags.forEach(tag => row.appendChild(makeFilterChip(tag)));
        outer.appendChild(row);
      }
    }
  }

  bar.appendChild(outer);

  // Sort overlay
  const existingOv = document.getElementById('tag-sort-overlay');
  if (tagSortMode && !existingOv) {
    const overlay = document.createElement('div');
    overlay.id = 'tag-sort-overlay';
    document.getElementById('app').appendChild(overlay);
  } else if (!tagSortMode && existingOv) {
    existingOv.remove();
  }
}

function makeOrAndToggle() {
  const current = settings.tagSearchMode || 'or';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'tag-search-mode-btn' + (current === 'and' ? ' and-mode' : '');
  btn.textContent = current === 'and' ? 'AND検索中' : 'OR検索中';
  btn.addEventListener('click', () => {
    settings.tagSearchMode = (settings.tagSearchMode || 'or') === 'or' ? 'and' : 'or';
    saveSettings();
    renderTagFilterBar();
    if (activeTagFilter.size > 0) renderRecipeList();
  });
  return btn;
}

function makeFilterChip(tag) {
  const chip = document.createElement('span');
  chip.className = 'filter-chip' + (activeTagFilter.has(tag.id) ? ' active' : '');
  chip.style.background = tag.color;
  chip.style.color = getTextColor(tag.color);
  chip.style.border = '1.5px solid ' + getTagBorderColor(tag.color);
  chip.style.textShadow = getTextShadow(tag.color);
  chip.textContent = tag.name;
  chip.addEventListener('click', () => {
    if (activeTagFilter.has(tag.id)) activeTagFilter.delete(tag.id);
    else activeTagFilter.add(tag.id);
    renderTagFilterBar();
    renderRecipeList();
  });
  return chip;
}

// ============================================================
// Tag sort chip (home screen drag reorder)
// ============================================================
function makeSortChip(tag, group) {
  const chip = document.createElement('span');
  chip.className = 'filter-chip sort-draggable';
  chip.style.background = tag.color;
  chip.style.color = getTextColor(tag.color);
  chip.style.border = '1.5px solid ' + getTagBorderColor(tag.color);
  chip.style.textShadow = getTextShadow(tag.color);
  chip.style.opacity = '1';
  chip.textContent = tag.name;
  chip.dataset.tagId = tag.id;
  chip.dataset.groupLabel = group.label;

  // Mouse events
  chip.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startTagSortDrag(chip, tag, group, e.clientX, e.clientY);
  });

  // Touch events
  chip.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    startTagSortDrag(chip, tag, group, t.clientX, t.clientY);
  }, { passive: true });

  return chip;
}

function startTagSortDrag(chip, tag, group, startX, startY) {
  tagSortDragSrcId = tag.id;
  tagSortDragGroup = group.label;
  tagSortSrcChip = chip;

  const rect = chip.getBoundingClientRect();
  const offsetX = startX - rect.left;
  const offsetY = startY - rect.top;

  // Create floating clone
  const floatEl = document.createElement('span');
  floatEl.className = 'tag-chip-floating';
  floatEl.style.background = tag.color;
  floatEl.style.color = getTextColor(tag.color);
  floatEl.style.border = '1.5px solid ' + getTagBorderColor(tag.color);
  floatEl.style.textShadow = getTextShadow(tag.color);
  floatEl.style.width = rect.width + 'px';
  floatEl.style.height = rect.height + 'px';
  floatEl.style.lineHeight = rect.height + 'px';
  floatEl.textContent = tag.name;
  floatEl.style.left = (startX - offsetX) + 'px';
  floatEl.style.top  = (startY - offsetY) + 'px';
  document.body.appendChild(floatEl);
  tagSortFloatEl = floatEl;

  // Create placeholder (same size, invisible)
  const ph = document.createElement('span');
  ph.className = 'filter-chip filter-chip-placeholder';
  ph.style.width = rect.width + 'px';
  ph.style.height = rect.height + 'px';
  chip.parentNode.insertBefore(ph, chip);
  tagSortPlaceholder = ph;

  // Hide original
  chip.style.visibility = 'hidden';

  function onMove(clientX, clientY) {
    // Clamp float position to .tag-filter-area container bounds
    const container = document.querySelector('.tag-filter-area');
    const chipW = rect.width;
    const chipH = rect.height;
    let px = clientX - offsetX;
    let py = clientY - offsetY;
    if (container) {
      const cr = container.getBoundingClientRect();
      px = Math.max(cr.left, Math.min(cr.right  - chipW, px));
      py = Math.max(cr.top,  Math.min(cr.bottom - chipH, py));
    }
    floatEl.style.left = px + 'px';
    floatEl.style.top  = py + 'px';

    // Use chip center (clamped) for hit-testing
    const cx = px + chipW / 2;
    const cy = py + chipH / 2;

    floatEl.style.display = 'none';
    const el = document.elementFromPoint(cx, cy);
    floatEl.style.display = '';

    const target = el ? el.closest('.filter-chip.sort-draggable') : null;
    if (target && target !== chip && target.dataset.groupLabel === group.label) {
      const targetRect = target.getBoundingClientRect();
      const insertBefore = cx < targetRect.left + targetRect.width * 0.75;
      if (insertBefore) {
        target.parentNode.insertBefore(ph, target);
      } else {
        target.parentNode.insertBefore(ph, target.nextSibling);
      }
    }
  }

  function onMouseMove(e) { onMove(e.clientX, e.clientY); }
  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }

  function finish() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd2);
    document.removeEventListener('touchcancel', onTouchEnd2);

    floatEl.remove();
    tagSortFloatEl = null;

    // Build new tag order by reading row children:
    // row has: label-span | chip | chip | ph | chip | ...
    // Replace placeholder position with drag src id, skip hidden src chip
    const row = ph.parentNode;
    const newOrder = [];
    [...row.children].forEach(child => {
      if (child === chip) return; // hidden original, skip
      if (child === ph) {
        newOrder.push(tag.id); // insert drag src at placeholder position
      } else if (child.dataset && child.dataset.tagId) {
        newOrder.push(child.dataset.tagId);
      }
    });
    if (!newOrder.includes(tag.id)) newOrder.push(tag.id);

    ph.remove();
    chip.style.visibility = '';
    tagSortSrcChip = null;
    tagSortPlaceholder = null;

    // For folder-view, group.label is '__folder__' — use the group directly
    const currentGroup = group.label === '__folder__'
      ? group
      : buildTagGroups().find(g => g.label === group.label);
    if (!currentGroup) { tagSortDragSrcId = tagSortDragGroup = null; return; }

    reorderTagsInGroupByIds(newOrder, currentGroup);
    tagSortDragSrcId = tagSortDragGroup = null;
  }

  function onMouseUp(e)   { finish(e.clientX, e.clientY); }
  function onTouchEnd2(e) { const t = e.changedTouches[0]; finish(t.clientX, t.clientY); }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend',  onTouchEnd2);
  document.addEventListener('touchcancel', onTouchEnd2);
}

function reorderTagsInGroupByIds(intendedIds, group) {
  intendedIds.forEach((id, i) => {
    const t = tags.find(t => t.id === id);
    if (t) t.order = i;
  });
  saveTags();
  renderTagFilterBar();
  showToast('順序を変更しました');
}

// ============================================================
// Keyboard / Visual Viewport utilities
// ============================================================

// Adjust a centered modal-overlay to follow the visual viewport
// (so it isn't obscured by the software keyboard).
// Returns a cleanup function to call when closing the modal.
function attachModalKeyboard(overlayEl, cardEl) {
  if (!window.visualViewport) return () => {};
  function update() {
    const vv = window.visualViewport;
    overlayEl.style.height = vv.height + 'px';
    overlayEl.style.top    = vv.offsetTop + 'px';
    if (cardEl) cardEl.style.maxHeight = Math.floor(vv.height * 0.92) + 'px';
  }
  window.visualViewport.addEventListener('resize', update);
  window.visualViewport.addEventListener('scroll', update);
  update();
  return () => {
    window.visualViewport.removeEventListener('resize', update);
    window.visualViewport.removeEventListener('scroll', update);
    overlayEl.style.height    = '';
    overlayEl.style.top       = '';
    if (cardEl) cardEl.style.maxHeight = '';
  };
}

// Scroll an input/textarea into view after the keyboard animation completes.
function focusScrollIntoView(el) {
  setTimeout(() => {
    if (el && document.activeElement === el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 320);
}

// ============================================================
// Long-press utility
// ============================================================
function attachLongPress(el, onLongPress, excludeSelector) {
  let timer = null;
  let sx = 0, sy = 0;
  let fired = false;
  const DELAY = 500;
  const MOVE_THRESHOLD = 10;

  const clear = () => { if (timer) { clearTimeout(timer); timer = null; } };

  const start = (clientX, clientY) => {
    fired = false;
    sx = clientX; sy = clientY;
    timer = setTimeout(() => {
      timer = null;
      fired = true;
      if (navigator.vibrate) navigator.vibrate(30);
      onLongPress();
    }, DELAY);
  };

  el.addEventListener('mousedown', (e) => {
    if (excludeSelector && e.target.closest(excludeSelector)) return;
    start(e.clientX, e.clientY);
  });
  el.addEventListener('mousemove', (e) => {
    if (!timer) return;
    if (Math.abs(e.clientX - sx) > MOVE_THRESHOLD || Math.abs(e.clientY - sy) > MOVE_THRESHOLD) clear();
  });
  el.addEventListener('mouseup',   clear);
  el.addEventListener('mouseleave', clear);
  el.addEventListener('click', (e) => {
    if (fired) { e.stopPropagation(); fired = false; }
  }, true); // capture to block post-longpress click

  el.addEventListener('touchstart', (e) => {
    if (excludeSelector && e.target.closest(excludeSelector)) return;
    const t = e.touches[0];
    start(t.clientX, t.clientY);
  }, { passive: true });
  el.addEventListener('touchmove', (e) => {
    if (!timer) return;
    const t = e.touches[0];
    if (Math.abs(t.clientX - sx) > MOVE_THRESHOLD || Math.abs(t.clientY - sy) > MOVE_THRESHOLD) clear();
  }, { passive: true });
  el.addEventListener('touchend',   clear);
  el.addEventListener('touchcancel', clear);
}

// ============================================================
// Bulk Edit
// ============================================================
let bulkEditMode = false;
const checkedRecipeIds = new Set();
const checkedFolderIds = new Set();
let _bulkTagInitialOn = new Set();  // tags that ALL selected recipes had when dialog opened
let _bulkTagCurrentOn = new Set();  // current ON/OFF state (user-modified)

function clearBulkEditState() {
  if (!bulkEditMode) return;
  bulkEditMode = false;
  checkedRecipeIds.clear();
  checkedFolderIds.clear();
  document.getElementById('bulk-action-bar').classList.remove('visible');
  document.getElementById('screen-list').classList.remove('bulk-bar-open');
}

function exitBulkEditMode() {
  clearBulkEditState();
  renderRecipeList();
}

function renderBulkToolbar() {
  const bar = document.getElementById('bulk-toolbar');
  if (!bar) return;
  bar.innerHTML = '';
  if (searchQuery) return;

  if (!bulkEditMode) {
    const hint = document.createElement('span');
    hint.className = 'bulk-hint-text';
    hint.textContent = '長押しで一括編集';
    bar.appendChild(hint);
    return;
  }

  // Bulk mode: 全選択/全解除 | count | 完了
  const row = document.createElement('div');
  row.className = 'bulk-control-row';

  const selAllBtn = document.createElement('button');
  selAllBtn.className = 'btn-bulk-select-all';
  selAllBtn.textContent = areAllChecked() ? '全解除' : '全選択';
  selAllBtn.addEventListener('click', () => {
    if (areAllChecked()) { checkedRecipeIds.clear(); checkedFolderIds.clear(); }
    else selectAllVisible();
    document.querySelectorAll('.recipe-card').forEach(card => {
      const cb = card.querySelector('input[type="checkbox"]');
      if (!cb) return;
      cb.checked = checkedRecipeIds.has(card.dataset.id);
      card.classList.toggle('bulk-checked', cb.checked);
    });
    document.querySelectorAll('.folder-card').forEach(card => {
      const cb = card.querySelector('input[type="checkbox"]');
      if (!cb) return;
      cb.checked = checkedFolderIds.has(card.dataset.folderId);
      card.classList.toggle('bulk-checked', cb.checked);
    });
    updateBulkActionBar();
  });
  row.appendChild(selAllBtn);

  const total = checkedRecipeIds.size + checkedFolderIds.size;
  const countLbl = document.createElement('span');
  countLbl.className = 'bulk-count-label';
  countLbl.textContent = total > 0 ? `${total}件選択中` : '';
  row.appendChild(countLbl);

  const doneBtn = document.createElement('button');
  doneBtn.className = 'btn-bulk-toggle done';
  doneBtn.textContent = '完了';
  doneBtn.addEventListener('click', exitBulkEditMode);
  row.appendChild(doneBtn);

  bar.appendChild(row);
}

function areAllChecked() {
  if (currentFolderView !== null) {
    const ids = recipes.filter(r => r.folderId === currentFolderView).map(r => r.id);
    return ids.length > 0 && ids.every(id => checkedRecipeIds.has(id));
  }
  if (activeTagFilter.size > 0) {
    const ids = getFilteredRecipes([...recipes]).map(r => r.id);
    return ids.length > 0 && ids.every(id => checkedRecipeIds.has(id));
  }
  const unassignedIds = recipes.filter(r => !r.folderId).map(r => r.id);
  const folderIds     = folders.map(f => f.id);
  const total = unassignedIds.length + folderIds.length;
  return total > 0 &&
    unassignedIds.every(id => checkedRecipeIds.has(id)) &&
    folderIds.every(id => checkedFolderIds.has(id));
}

function selectAllVisible() {
  if (currentFolderView !== null) {
    recipes.filter(r => r.folderId === currentFolderView).forEach(r => checkedRecipeIds.add(r.id));
  } else if (activeTagFilter.size > 0) {
    getFilteredRecipes([...recipes]).forEach(r => checkedRecipeIds.add(r.id));
  } else {
    recipes.filter(r => !r.folderId).forEach(r => checkedRecipeIds.add(r.id));
    folders.forEach(f => checkedFolderIds.add(f.id));
  }
}

function updateBulkActionBar() {
  const bar    = document.getElementById('bulk-action-bar');
  const screen = document.getElementById('screen-list');
  const total  = checkedRecipeIds.size + checkedFolderIds.size;

  if (total === 0) {
    bar.classList.remove('visible');
    screen.classList.remove('bulk-bar-open');
  } else {
    bar.classList.add('visible');
    screen.classList.add('bulk-bar-open');
  }

  const isInFolder = currentFolderView !== null;
  const hasR = checkedRecipeIds.size > 0;
  const hasF = checkedFolderIds.size > 0;

  document.getElementById('btn-bulk-delete').style.display = '';
  if (isInFolder) {
    document.getElementById('btn-bulk-move').style.display    = '';
    document.getElementById('btn-bulk-add-tag').style.display = '';
  } else {
    document.getElementById('btn-bulk-add-tag').style.display = 'none';
    document.getElementById('btn-bulk-move').style.display    = (hasR && !hasF) ? '' : 'none';
  }

  renderBulkToolbar(); // refresh count and select-all text in toolbar
}

// Bulk delete
document.getElementById('btn-bulk-delete').addEventListener('click', () => {
  const rCount = checkedRecipeIds.size;
  const fCount = checkedFolderIds.size;

  if (fCount > 0 && rCount === 0) {
    const names = [...checkedFolderIds].map(id => folders.find(f => f.id === id)?.name).filter(Boolean);
    const title = fCount === 1 ? `「${names[0]}」を削除` : `${fCount}件のフォルダを削除`;
    document.getElementById('modal-folder-delete-title').textContent = title;
    document.getElementById('modal-folder-delete-msg').textContent = 'フォルダ内のレシピをどうしますか？';
    _folderDeleteTargetId = '__bulk__';
    document.getElementById('modal-folder-delete').classList.remove('hidden');

  } else if (rCount > 0 && fCount === 0) {
    document.getElementById('modal-bulk-confirm-msg').textContent =
      `選択した${rCount}件のレシピを削除しますか？`;
    document.getElementById('btn-bulk-confirm-ok').onclick = () => {
      hideBulkConfirmModal();
      recipes = recipes.filter(r => !checkedRecipeIds.has(r.id));
      saveRecipes();
      exitBulkEditMode();
      showToast(`${rCount}件のレシピを削除しました`);
    };
    document.getElementById('modal-bulk-confirm').classList.remove('hidden');

  } else {
    document.getElementById('modal-bulk-confirm-msg').textContent =
      '選択したフォルダとレシピを削除しますか？フォルダ内のレシピも全て削除されます。';
    document.getElementById('btn-bulk-confirm-ok').onclick = () => {
      hideBulkConfirmModal();
      const folderRecipeIds = new Set();
      checkedFolderIds.forEach(fid => recipes.filter(r => r.folderId === fid).forEach(r => folderRecipeIds.add(r.id)));
      recipes = recipes.filter(r => !checkedRecipeIds.has(r.id) && !folderRecipeIds.has(r.id));
      const toDelF = new Set(checkedFolderIds);
      folders = folders.filter(f => !toDelF.has(f.id));
      tags.forEach(t => {
        if (Array.isArray(t.scope)) {
          t.scope = t.scope.filter(id => !toDelF.has(id));
          if (t.scope.length === 0) t.scope = 'all';
        }
      });
      saveRecipes(); saveFolders(); saveTags();
      exitBulkEditMode();
      showToast('削除しました');
    };
    document.getElementById('modal-bulk-confirm').classList.remove('hidden');
  }
});

// Bulk edit tags
function renderBulkTagChips() {
  const wrap = document.getElementById('bulk-tag-chips-wrap');
  wrap.innerHTML = '';

  const contextTags = getTagsForContext(currentFolderView).sort((a, b) => a.order - b.order);

  if (contextTags.length === 0) {
    const msg = document.createElement('span');
    msg.style.cssText = 'font-size:14px;color:#718096';
    msg.textContent = '使用可能なタグがありません';
    wrap.appendChild(msg);
  } else {
    contextTags.forEach(tag => {
      const isOn = _bulkTagCurrentOn.has(tag.id);
      const chip = document.createElement('span');
      chip.className = 'tag-chip-sm';
      chip.style.cssText = `background:${tag.color};color:${getTextColor(tag.color)};cursor:pointer;padding:5px 12px;font-size:13px;` +
        `border:1.5px solid ${getTagBorderColor(tag.color)};text-shadow:${getTextShadow(tag.color)};outline-offset:2px;transition:opacity 0.12s,outline 0.12s;` +
        (isOn ? 'opacity:1;outline:2px solid rgba(0,0,0,0.35);' : 'opacity:0.4;');
      chip.textContent = (isOn ? '✓ ' : '') + tag.name;
      chip.addEventListener('click', () => {
        if (_bulkTagCurrentOn.has(tag.id)) _bulkTagCurrentOn.delete(tag.id);
        else                               _bulkTagCurrentOn.add(tag.id);
        renderBulkTagChips();
      });
      wrap.appendChild(chip);
    });
  }

  // "＋ 新しいタグ" button
  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'tag-chip-add';
  addBtn.textContent = '＋ 新しいタグ';
  addBtn.addEventListener('click', () => {
    const bulkModal = document.getElementById('modal-bulk-tag');
    bulkModal.classList.add('hidden');

    let restored = false;
    const restore = () => {
      if (restored) return;
      restored = true;
      renderBulkTagChips();
      bulkModal.classList.remove('hidden');
    };

    const cancelBtn = document.getElementById('btn-modal-tag-cancel');
    const tagModal  = document.getElementById('modal-tag');
    cancelBtn.addEventListener('click', restore, { once: true });
    const ovHandler = (e) => {
      if (e.target === tagModal) { restore(); tagModal.removeEventListener('click', ovHandler); }
    };
    tagModal.addEventListener('click', ovHandler);

    showTagModal('create', null, () => {
      cancelBtn.removeEventListener('click', restore);
      tagModal.removeEventListener('click', ovHandler);
      const newTag = tags[tags.length - 1];
      if (newTag) _bulkTagCurrentOn.add(newTag.id);
      restore();
    });
  });
  wrap.appendChild(addBtn);
}

document.getElementById('btn-bulk-add-tag').addEventListener('click', () => {
  _bulkTagInitialOn.clear();
  _bulkTagCurrentOn.clear();

  // Compute initial ON: tags that ALL selected recipes have
  const selectedRecipes = [...checkedRecipeIds]
    .map(id => recipes.find(r => r.id === id)).filter(Boolean);
  const contextTags = getTagsForContext(currentFolderView);
  contextTags.forEach(tag => {
    if (selectedRecipes.length > 0 &&
        selectedRecipes.every(r => (r.tagIds || []).includes(tag.id))) {
      _bulkTagInitialOn.add(tag.id);
      _bulkTagCurrentOn.add(tag.id);
    }
  });

  renderBulkTagChips();
  document.getElementById('modal-bulk-tag').classList.remove('hidden');
});

document.getElementById('btn-bulk-tag-cancel').addEventListener('click', () => {
  document.getElementById('modal-bulk-tag').classList.add('hidden');
});
document.getElementById('modal-bulk-tag').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-bulk-tag'))
    document.getElementById('modal-bulk-tag').classList.add('hidden');
});
document.getElementById('btn-bulk-tag-apply').addEventListener('click', () => {
  document.getElementById('modal-bulk-tag').classList.add('hidden');
  const recipeCount = checkedRecipeIds.size;

  // Apply diff: ON→unchanged stays, OFF→ON adds, ON→OFF removes
  checkedRecipeIds.forEach(id => {
    const r = recipes.find(r => r.id === id);
    if (!r) return;
    if (!r.tagIds) r.tagIds = [];
    // Tags turned ON (that weren't initially ON): add
    _bulkTagCurrentOn.forEach(tagId => {
      if (!r.tagIds.includes(tagId)) r.tagIds.push(tagId);
    });
    // Tags turned OFF (that were initially ON): remove
    _bulkTagInitialOn.forEach(tagId => {
      if (!_bulkTagCurrentOn.has(tagId)) {
        r.tagIds = r.tagIds.filter(id2 => id2 !== tagId);
      }
    });
  });

  saveRecipes();
  exitBulkEditMode();
  showToast(`${recipeCount}件のレシピのタグを更新しました`);
});

// ============================================================
function renderRecipeList() {
  renderTagFilterBar();
  renderBulkToolbar();

  const container = document.getElementById('recipe-list-container');
  container.innerHTML = '';
  if (bulkEditMode) container.classList.add('bulk-edit-active');
  else              container.classList.remove('bulk-edit-active');

  const titleEl = document.getElementById('list-screen-title');
  const folderBtn = document.getElementById('btn-new-folder');

  // === Search mode: flat list across all recipes ===
  if (searchQuery) {
    titleEl.textContent = 'レシピ一覧';
    folderBtn.style.display = '';
    let results = getSearchedRecipes([...recipes].sort((a, b) => a.order - b.order));
    results = getFilteredRecipes(results);
    if (results.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-icon">🔍</div><p>該当するレシピがありません。</p>';
      container.appendChild(empty);
    } else {
      const countEl = document.createElement('div');
      countEl.style.cssText = 'font-size:13px;color:#718096;margin-bottom:8px';
      countEl.textContent = `${results.length}件`;
      container.appendChild(countEl);
      renderRecipeCards(container, results);
    }
    return;
  }

  if (currentFolderView !== null) {
    // === Folder contents view ===
    const folder = folders.find(f => f.id === currentFolderView);
    titleEl.textContent = folder ? folder.name : 'フォルダ';
    folderBtn.style.display = 'none';

    let folderRecipes = recipes
      .filter(r => r.folderId === currentFolderView)
      .sort((a, b) => a.order - b.order);

    folderRecipes = getFilteredRecipes(folderRecipes);

    if (folderRecipes.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      if (activeTagFilter.size > 0) {
        empty.innerHTML = '<div class="empty-icon">🏷</div><p>絞り込み条件に一致するレシピがありません。</p>';
      } else {
        empty.innerHTML = '<div class="empty-icon">📂</div><p>このフォルダにはまだレシピがありません。<br>「📁 移動」でレシピを追加できます。</p>';
      }
      container.appendChild(empty);
    } else {
      if (activeTagFilter.size > 0) {
        const countEl = document.createElement('div');
        countEl.style.cssText = 'font-size:13px;color:#718096;margin-bottom:8px';
        countEl.textContent = `${folderRecipes.length}件`;
        container.appendChild(countEl);
      }
      renderRecipeCards(container, folderRecipes);
    }
    return;
  }

  // === Main list view ===
  titleEl.textContent = 'レシピ一覧';
  folderBtn.style.display = '';

  const hasFolders   = folders.length > 0;
  const totalRecipes = recipes.length;

  // Tag filter active: show flat list across all folders
  if (activeTagFilter.size > 0) {
    const filtered = getFilteredRecipes([...recipes].sort((a, b) => a.order - b.order));
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-icon">🏷</div><p>該当するレシピがありません。</p>';
      container.appendChild(empty);
    } else {
      const countEl = document.createElement('div');
      countEl.style.cssText = 'font-size:13px;color:#718096;margin-bottom:8px';
      countEl.textContent = `${filtered.length}件`;
      container.appendChild(countEl);
      renderRecipeCards(container, filtered);
    }
    return;
  }

  // Wrap main list content in outer frame
  const listOuter = document.createElement('div');
  listOuter.className = 'recipe-list-outer';

  if (!hasFolders && totalRecipes === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="empty-icon">📋</div><p>まだレシピがありません。<br>新規登録してみましょう！</p>';
    listOuter.appendChild(empty);
  } else if (hasFolders) {
    renderFolderCards(listOuter);

    const unassigned = recipes.filter(r => !r.folderId).sort((a, b) => a.order - b.order);
    if (unassigned.length > 0) {
      const div = document.createElement('div');
      div.className = 'list-section-divider';
      div.innerHTML = '<span class="list-section-label">フォルダなし</span>';
      listOuter.appendChild(div);
      renderRecipeCards(listOuter, unassigned);
    }
  } else {
    renderRecipeCards(listOuter, [...recipes].sort((a, b) => a.order - b.order));
  }

  container.appendChild(listOuter);
}
